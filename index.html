<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --forest:#1a3a2a;--forest2:#254d38;--forest3:#2e6347;--sage:#5a8a6f;--mint:#a8d5b5;
  --cream:#f7f4ef;--cream2:#ede9e1;--warm:#d4c5a9;--gold:#c9a84c;--gold2:#b8942e;
  --card:#fff;--text:#1c2b22;--muted:#6b7f72;--border:#e0dbd0;
  --red:#d64e4e;--red-bg:#fdf0f0;--green:#2e7d52;--green-bg:#edf7f1;
  --amber:#b87c1a;--amber-bg:#fdf6e8;--blue:#2563eb;--blue-bg:#eff6ff;
  --r:14px;--sh:0 1px 3px rgba(26,58,42,.07),0 6px 20px rgba(26,58,42,.06);
  --shl:0 8px 32px rgba(26,58,42,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--warm);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.spin{width:32px;height:32px;border:3px solid var(--forest3);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--forest) 0%,var(--forest2) 50%,var(--forest3) 100%);padding:20px}
.auth-card{background:var(--card);border-radius:22px;padding:44px 40px;width:100%;max-width:420px;box-shadow:var(--shl)}
.brand-mark{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.brand-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--forest),var(--forest3));
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:26px;height:26px;fill:none;stroke:var(--mint);stroke-width:1.8}
.brand-name{font-size:19px;font-weight:700;color:var(--forest);letter-spacing:-.3px;line-height:1.2}
.brand-name em{font-style:normal;color:var(--gold)}.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
.atabs{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:26px}
.atab{flex:1;border:none;background:transparent;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)}
.atab.on{background:var(--forest);color:#fff}
.fld{margin-bottom:18px}.fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.fld input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14.5px;font-family:inherit;background:var(--cream);color:var(--text)}
.fld input:focus{outline:none;border-color:var(--forest3);background:#fff}
.fld2g{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btnp{width:100%;background:linear-gradient(135deg,var(--forest),var(--forest3));color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btnp:hover{filter:brightness(1.08)}.btnp:disabled{opacity:.6;cursor:not-allowed}
.amsg{padding:10px 13px;border-radius:8px;font-size:13.5px;margin-bottom:14px;display:none}
.amsg.err{background:var(--red-bg);color:var(--red);border:1px solid #f5c6c6;display:block}
.amsg.ok{background:var(--green-bg);color:var(--green);border:1px solid #b8dfc8;display:block}
.afoot{font-size:12px;color:var(--muted);text-align:center;margin-top:16px}
.danc{font-size:11px;color:var(--warm);text-align:center;margin-top:24px;letter-spacing:2px;font-weight:500}
#app-screen{display:none;min-height:100vh}
header{background:linear-gradient(135deg,var(--forest),var(--forest2));padding:0 24px;height:62px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(26,58,42,.2)}
.hbrand{display:flex;align-items:center;gap:10px;color:#fff}
.hico{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.hico svg{width:18px;height:18px;fill:none;stroke:var(--mint);stroke-width:1.8}
.htit{font-size:16px;font-weight:700;letter-spacing:-.2px;color:#fff}
.htit small{font-size:11px;font-weight:400;color:rgba(255,255,255,.5);margin-left:6px}
.hr{margin-left:auto;display:flex;align-items:center;gap:10px}
.hun{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.hav{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--forest)}
.hout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.hout:hover{background:rgba(255,255,255,.2)}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:62px;z-index:40}
.nb{border:none;background:none;padding:14px 15px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nb:hover{color:var(--forest)}.nb.on{color:var(--forest);border-bottom-color:var(--gold)}
.nb svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8}
main{max-width:1200px;margin:0 auto;padding:26px 24px 80px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:22px}
.ctit{font-size:15px;font-weight:700;color:var(--forest);display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.sc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:20px 22px}
.sl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.sv{font-size:26px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.sh2{font-size:12px;color:var(--muted);margin-top:3px}
.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{background:var(--cream);color:var(--muted);text-align:left;padding:10px 12px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.hv:hover{background:var(--cream)}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;display:inline-block;white-space:nowrap}
.bg{background:var(--green-bg);color:var(--green)}.br{background:var(--red-bg);color:var(--red)}
.ba{background:var(--amber-bg);color:var(--amber)}.bb{background:var(--blue-bg);color:var(--blue)}
.bm{background:var(--cream2);color:var(--muted)}
.t-CONS{background:#e8f5e9;color:#2e7d32}.t-DIF{background:#e3f2fd;color:#1565c0}
.t-PAGO{background:#fff3e0;color:#e65100}.t-ND{background:var(--cream2);color:var(--muted)}
.t-OTRO{background:var(--cream2);color:var(--muted)}
.btn{border:none;border-radius:9px;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
.bfo{background:var(--forest);color:#fff}.bfo:hover{background:var(--forest2)}
.bgo{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--forest)}
.bgh{background:var(--cream);color:var(--muted);border:1.5px solid var(--border)}.bgh:hover{color:var(--forest)}
.bda{background:var(--red-bg);color:var(--red)}
.sm{padding:5px 11px;font-size:12px;border-radius:7px}.xs{padding:3px 8px;font-size:11px;border-radius:6px}
.pw{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden;margin:8px 0}
.pb{height:100%;border-radius:4px;transition:width .5s ease}
.ff{margin-bottom:16px}
.ff label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.ff input,.ff select,.ff textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--text)}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--forest3);background:#fff}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.seg{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.seg button{flex:1;border:none;background:var(--cream);padding:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)}
.sg{background:var(--green-bg)!important;color:var(--green)!important}
.sr{background:var(--red-bg)!important;color:var(--red)!important}
.mbg{position:fixed;inset:0;background:rgba(26,58,42,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px)}
.mbg.on{display:flex}
.mbox{background:var(--card);border-radius:18px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mbox h3{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;color:var(--forest)}
.mx{cursor:pointer;color:var(--muted);font-size:22px;font-weight:300;line-height:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.obc{background:linear-gradient(135deg,var(--forest),var(--forest3));border-radius:var(--r);padding:26px;color:#fff;margin-bottom:20px;animation:fadein .4s ease}
.obc h3{font-size:17px;font-weight:700;margin-bottom:8px}
.obc p{font-size:13.5px;opacity:.85;line-height:1.6;margin-bottom:16px}
.obs{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.obst{background:rgba(255,255,255,.1);border-radius:10px;padding:13px}
.obst .on{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:4px}
.obst p{font-size:12.5px;opacity:.85;margin:0}
.part-row{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:9px;padding:9px 11px;margin-bottom:6px}
.part-row input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff}
@media(max-width:640px){.f2,.fld2g{grid-template-columns:1fr}.g3{grid-template-columns:1fr}main{padding:16px 14px 70px}.mbox{padding:20px}.auth-card{padding:28px 22px}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="brand-mark">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg></div>
      <div><div class="brand-name">Finanzas <em>Personales</em></div><div class="brand-sub">Control inteligente de tus finanzas</div></div>
    </div>
    <div class="atabs">
      <button class="atab on" onclick="swTab('l')">Ingresar</button>
      <button class="atab" onclick="swTab('r')">Registrarse</button>
    </div>
    <div id="amsg" class="amsg"></div>
    <div id="tl">
      <div class="fld"><label>Correo</label><input type="email" id="le" placeholder="tu@correo.com" onkeydown="if(event.key==='Enter')login()"></div>
      <div class="fld"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btnp" onclick="login()" id="blg">Ingresar a mi cuenta</button>
      <div class="afoot"><a href="#" onclick="reset()" style="color:var(--forest3);font-weight:600">¿Olvidaste tu contraseña?</a></div>
    </div>
    <div id="tr" style="display:none">
      <div class="fld2g">
        <div class="fld"><label>Nombre</label><input type="text" id="rn" placeholder="Juan"></div>
        <div class="fld"><label>Apellido</label><input type="text" id="ra" placeholder="Pérez"></div>
      </div>
      <div class="fld"><label>Correo</label><input type="email" id="re" placeholder="tu@correo.com"></div>
      <div class="fld"><label>Contraseña (mín. 8 caracteres)</label><input type="password" id="rp" placeholder="••••••••"></div>
      <button class="btnp" onclick="register()" id="brg">Crear mi cuenta gratuita</button>
    </div>
    <div class="danc">D · A · N · C</div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="hbrand">
      <div class="hico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg></div>
      <div class="htit">Finanzas Personales <small>beta</small></div>
    </div>
    <div class="hr">
      <span class="hun" id="hun"></span>
      <div class="hav" id="hav">?</div>
      <button class="hout" onclick="logout()">Salir</button>
    </div>
  </header>
  <nav>
    <button class="nb on" data-v="resumen" onclick="nav(this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Resumen</button>
    <button class="nb" data-v="presupuesto" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke-linecap="round"/></svg>Presupuesto</button>
    <button class="nb" data-v="obligaciones" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round"/></svg>Obligaciones</button>
    <button class="nb" data-v="ahorros" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M19 7V4a1 1 0 00-1-1H5a2 2 0 000 4h15a1 1 0 011 1v4h-3a2 2 0 000 4h3a1 1 0 001-1v-2a1 1 0 00-1-1" stroke-linecap="round"/><path d="M3 5v14a2 2 0 002 2h15a1 1 0 001-1v-4" stroke-linecap="round"/></svg>Ahorros</button>
    <button class="nb" data-v="extractos" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15" stroke-linecap="round"/></svg>Extractos</button>
    <button class="nb" data-v="nieve" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M2 12h20M12 2l-4 4m4-4l4 4M12 22l-4-4m4 4l4-4" stroke-linecap="round"/></svg>Bola de Nieve</button>
  </nav>
  <main id="main"></main>
</div>

<div class="mbg" id="mbg"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>

<script>
const SB=supabase.createClient("https://dzlxyapzbdhfdundgcpm.supabase.co","sb_publishable_TXM_Hg1PwsKFrXkoBCzfcQ_VaDkIcSs");
let U=null,P=null,V='resumen',mesV=new Date().getMonth()+1,anioV=new Date().getFullYear();
const MES=mesV,ANIO=anioV;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const fmt=v=>'$ '+(+v||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const hoy=()=>new Date().toISOString().slice(0,10);
const mesN=m=>['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m-1];
const ff=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}):'—';
const ld=()=>`<div class="spin"></div>`;

function toast(m,d=2400){const t=$('#toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),d)}
function openM(h){$('#mbox').innerHTML=h;$('#mbg').classList.add('on')}
function closeM(){$('#mbg').classList.remove('on')}
$('#mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeM()});

// AUTH
function swTab(t){
  $$('.atab').forEach((b,i)=>b.classList.toggle('on',i===(t==='l'?0:1)));
  $('#tl').style.display=t==='l'?'block':'none';
  $('#tr').style.display=t==='r'?'block':'none';
  $('#amsg').className='amsg';
}
function amsg(m,t='err'){const e=$('#amsg');e.textContent=m;e.className='amsg '+t}
async function login(){
  const e=$('#le').value.trim(),p=$('#lp').value;
  if(!e||!p)return amsg('Ingresa correo y contraseña.');
  $('#blg').disabled=true;$('#blg').textContent='Verificando...';
  const{error}=await SB.auth.signInWithPassword({email:e,password:p});
  if(error){amsg(error.message);$('#blg').disabled=false;$('#blg').textContent='Ingresar a mi cuenta'}
}
async function register(){
  const n=$('#rn').value.trim(),a=$('#ra').value.trim(),e=$('#re').value.trim(),p=$('#rp').value;
  if(!n||!e||!p)return amsg('Completa todos los campos.');
  if(p.length<8)return amsg('Contraseña: mínimo 8 caracteres.');
  $('#brg').disabled=true;$('#brg').textContent='Creando cuenta...';
  const{error}=await SB.auth.signUp({email:e,password:p,options:{data:{nombre:n,apellido:a}}});
  if(error){amsg(error.message);$('#brg').disabled=false;$('#brg').textContent='Crear mi cuenta gratuita'}
  else amsg('¡Cuenta creada! Intenta ingresar directamente o revisa tu correo para confirmar.','ok');
}
async function reset(){const e=prompt('Ingresa tu correo:');if(e){await SB.auth.resetPasswordForEmail(e);amsg('Revisa tu correo.','ok')}}
async function logout(){await SB.auth.signOut()}

SB.auth.onAuthStateChange(async(ev,sess)=>{
  if(sess?.user){
    U=sess.user;
    const{data}=await SB.from('perfiles').select('*').eq('id',U.id).single();
    P=data;
    $('#auth-screen').style.display='none';
    $('#app-screen').style.display='block';
    const nm=P?.nombre||U.email.split('@')[0];
    $('#hun').textContent=nm;$('#hav').textContent=nm.charAt(0).toUpperCase();
    rv();
  }else{U=null;P=null;$('#auth-screen').style.display='flex';$('#app-screen').style.display='none'}
});

function nav(btn){$$('.nb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');V=btn.dataset.v;rv()}
function rv(){const m={resumen:rR,presupuesto:rP,obligaciones:rO,ahorros:rA,extractos:rE,nieve:rN};if(m[V])m[V]()}

// ── RESUMEN ────────────────────────────────────────────────
async function rR(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const[{data:ing},{data:gas},{data:obls}]=await Promise.all([
    SB.from('ingresos').select('valor').eq('usuario_id',uid).eq('anio',ANIO).eq('mes',MES),
    SB.from('gastos').select('valor,naturaleza').eq('usuario_id',uid).eq('anio',ANIO).eq('mes',MES),
    SB.from('obligaciones').select('*,cuotas(valor_pagado,estado)').or(`titular_id.eq.${uid},deudor_id.eq.${uid}`).eq('estado','activa')
  ]);
  const tI=(ing||[]).reduce((a,r)=>a+(+r.valor),0);
  const tG=(gas||[]).reduce((a,r)=>a+(+r.valor),0);
  const md=(obls||[]).filter(o=>o.titular_id===uid&&o.deudor_id!==uid).reduce((a,o)=>{const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);return a+Math.max(+o.monto_total-p,0)},0);

  const tLD=leDebo.reduce((a,o)=>{const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);return a+Math.max(+o.monto_total-p,0)},0);

async function savObl(){
  const nom=$('#on').value.trim(),m=+$('#om').value,f=$('#of').value;
  const email=$('#oe').value.trim().toLowerCase(),nombreP=$('#onp').value.trim();
  if(!nom||!m)return toast('⚠ Nombre y monto requeridos');
  const uid=U.id;
  const{data:obl,error}=await SB.from('obligaciones').insert({
    titular_id:uid,deudor_id:uid,nombre:nom,descripcion:$('#og').value||'',
    monto_total:m,fecha_inicio:f,num_cuotas:+$('#oq').value||null,valor_cuota:+$('#ovc').value||null,
    notas:($('#ono').value||'')+(email?`\nDeudor: ${nombreP||email} (${email})`:''),estado:'activa'
  }).select().single();
  if(error)return toast('Error: '+error.message);
  const nc=+$('#oq').value;
  if(nc>0){
    const vc=+$('#ovc').value||m/nc;const[y,mo]=f.split('-').map(Number);const rows=[];
    for(let i=1;i<=nc;i++){const mm=(mo-1+(i-1))%12+1,yy=y+Math.floor((mo-1+(i-1))/12);
      rows.push({obligacion_id:obl.id,numero:i,concepto:`Cuota ${i}`,fecha_prog:`${yy}-${String(mm).padStart(2,'0')}-01`,valor_esperado:vc})}
    await SB.from('cuotas').insert(rows);
  }else await SB.from('cuotas').insert({obligacion_id:obl.id,numero:1,concepto:'Saldo',valor_esperado:m});
  if(email)await SB.from('invitaciones').insert({remitente_id:uid,destinatario_email:email,obligacion_id:obl.id});
  toast('Obligación creada ✓'+(email?` — se notificará a ${email}`:''));closeM();rO();
}

// ── PARSER PDF ─────────────────────────────────────────────
// Extrae texto real de PDFs digitales usando streams BT...ET
async function parsePDF(file){
  const ab=await file.arrayBuffer();
  const dec=new TextDecoder('latin1');
  const raw=dec.decode(new Uint8Array(ab));

  // Método 1: extraer cadenas de texto de streams BT/ET
  const chunks=[];
  const re=/BT([\s\S]*?)ET/g;let m;
  while((m=re.exec(raw))!==null){
    const block=m[1];
    // Tj simple: (texto) Tj
    const tj=/\(([^)]{0,200})\)\s*Tj/g;let t;
    let line='';
    while((t=tj.exec(block))!==null) line+=t[1];
    // TJ array: [(texto)(texto)...] TJ
    const tj2=/\[([^\]]{0,500})\]\s*TJ/g;
    while((t=tj2.exec(block))!==null){
      const parts=t[1].match(/\(([^)]*)\)/g)||[];
      line+=parts.map(s=>s.slice(1,-1)).join('');
    }
    if(line.trim()&&line.trim().length>1) chunks.push(line.trim());
  }

  // Método 2: si método 1 no extrajo nada, buscar texto plano entre streams
  if(chunks.length<5){
    const streams=raw.match(/stream([\s\S]*?)endstream/g)||[];
    for(const s of streams){
      const t=s.replace(/stream|endstream/g,'').replace(/[^\x20-\x7E\n]/g,' ').trim();
      if(t.length>10) chunks.push(...t.split('\n').filter(l=>l.trim().length>3));
    }
  }

  const texto=chunks.join('\n');
  const banco=detBanco(texto);
  const lineas=chunks.map(l=>l.trim()).filter(Boolean);
  console.log('Banco detectado:',banco,'Líneas:',lineas.length,'Muestra:',lineas.slice(0,10));

  if(banco==='PacifiCard') parsPC(lineas);
  else if(banco==='Diners'||banco==='Discover') parsDC(lineas,banco);
  else if(banco==='Pichincha') parsPI(lineas);
  else parsGen(lineas,banco);
}

function detBanco(t){
  if(t.includes('PACIFICARD')||t.includes('PacifiCard')||t.includes('intermatico')) return 'PacifiCard';
  if(t.includes('DINERS CLUB')||t.includes('dinersclub')||t.includes('Diners Club')) return 'Diners';
  if(t.includes('DISCOVER')||t.includes('discover.ec')) return 'Discover';
  if(t.includes('BANCO PICHINCHA')||t.includes('pichincha.com')||t.includes('VISA PLATINUM')) return 'Pichincha';
  return 'Desconocido';
}

const MESES={ENE:1,FEB:2,MAR:3,ABR:4,MAY:5,JUN:6,JUL:7,AGO:8,SEP:9,OCT:10,NOV:11,DIC:12};

// PacifiCard: ENE/29 151978 SU PAGO... TIPO VALOR
// Sección: DETALLE DE MOVIMIENTOS DEL PERÍODO
function parsPC(lineas){
  let sec=false,i=0;
  // Reconstruir líneas del estado real concatenando chunks adyacentes
  // PacifiCard tiene: fecha, referencia, descripción, lugar, tipo, valor en líneas separadas
  // Vamos línea por línea buscando el patrón de fecha
  for(i=0;i<lineas.length;i++){
    const l=lineas[i];
    if(l.includes('DETALLE DE MOVIMIENTOS DEL PERÍODO')||l.includes('DETALLE DE MOVIMIENTOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('TOTAL PAGO DE CONTADO')||l.includes('CONCEPTOS BÁSICOS')||l.includes('DATOS INFORMATIVOS'))break;

    // Patrón fecha: ENE/29 o similar al inicio
    const mFecha=l.match(/^([A-Z]{3})\/(\d{1,2})/);
    if(mFecha){
      const mes=mFecha[1],dia=parseInt(mFecha[2]);
      const mesN2=MESES[mes]||MES;
      // Buscar tipo y valor en esta línea o en las siguientes
      const todoL=[l,...(lineas.slice(i+1,i+4))].join(' ');
      const mTipo=todoL.match(/\b(CONS|DIF|PAGO|N\/D|AV)\b/);
      const mVal=todoL.match(/(\d{1,3}(?:[.,]\d{3})*[.,]\d{2})(?:\s*[\+\-])?(?:\s*$|\s+[\+\-])/);
      if(mTipo&&mVal){
        // Extraer descripción (todo entre fecha+ref y tipo)
        const desc=l.replace(/^[A-Z]{3}\/\d+\s+\d+\s*/,'').replace(/\s+(CONS|DIF|PAGO|N\/D|AV).*$/,'').trim();
        const val=parseFloat(mVal[1].replace(/[.,](?=\d{3})/g,'').replace(',','.'));
        if(val>0) extB.push({banco:'PacifiCard',fecha_tx:`${ANIO}-${String(mesN2).padStart(2,'0')}-${String(dia).padStart(2,'0')}`,concepto:desc||'Movimiento',tipo_op:mTipo[1],valor:val,categoria:acat(desc)});
      }
    }
    // Saldo anterior
    if(l.includes('SALDO ANTERIOR')){
      const mv=l.match(/([\d.,]+)/);
      if(mv){const v=parseFloat(mv[1].replace(',','.'));if(v>0) extB.push({banco:'PacifiCard',fecha_tx:null,concepto:'SALDO ANTERIOR',tipo_op:'ND',valor:v,categoria:'Informativo'})}
    }
  }
}

// Diners/Discover: DD/MM VALE ESTABLECIMIENTO CUOTA VALOR IVA
// Sección: Consumo período actual + Detalle débitos y créditos
function parsDC(lineas,banco){
  let sec=false;
  for(let i=0;i<lineas.length;i++){
    const l=lineas[i];
    if(l.includes('Consumo período actual')||l.includes('Detalle débitos y créditos')||l.includes('DETALLE DE PAGOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('Información de tarifas')||l.includes('Comprobante de venta'))break;
    // Formato: 06/04 430126 TECNOMEGA INTERNET (4/6) 18,02
    const m=l.match(/^(\d{2})\/(\d{2})\s+(\d+)\s+(.+?)\s+(?:\(\d+\/\d+\)\s+)?([\d,.]+)(?:\s|$)/);
    if(m){
      const[,dd,mm,,desc,val]=m;
      const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0){
        let tipo='CONS';
        const dU=desc.toUpperCase();
        if(dU.includes('PAGO')||dU.includes('MUCHAS GRACIAS'))tipo='PAGO';
        else if(dU.includes('IVA')||dU.includes('SOLCA'))tipo='ND';
        else if(l.includes('('))tipo='DIF';
        extB.push({banco,fecha_tx:`${ANIO}-${mm}-${dd}`,concepto:desc.trim(),tipo_op:tipo,valor:v,categoria:acat(desc)});
      }
    }
    // Pagos sueltos
    if(l.includes('SU PAGO')||l.includes('MUCHAS GRACIAS')){
      const mv=(l.match(/[\d,.]+$/))||[];
      if(mv[0]){const v=parseFloat(mv[0].replace(',','.'));
        if(v>0) extB.push({banco,fecha_tx:null,concepto:'SU PAGO',tipo_op:'PAGO',valor:v,categoria:'Pago'})}
    }
    // SALDO ANTERIOR
    if(l.includes('SALDO ANTERIOR')){
      const mv=lineas[i+1]?.match(/^([\d,.]+)/);
      if(mv){const v=parseFloat(mv[1].replace(',','.'));if(v>0) extB.push({banco,fecha_tx:null,concepto:'SALDO ANTERIOR',tipo_op:'ND',valor:v,categoria:'Informativo'})}
    }
  }
}

// Pichincha: DD/MM REF DESCRIPCION OPERACION VALORES
// Sección: DETALLE DE MOVIMIENTOS
function parsPI(lineas){
  let sec=false;
  for(let i=0;i<lineas.length;i++){
    const l=lineas[i];
    if(l.includes('DETALLE DE MOVIMIENTOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('TOTAL CONSUMOS MES')||l.includes('INFORMACIÓN FINANCIERA')||l.includes('GLOSARIO'))break;
    // 28/05 560103 SU PAGO "MUCHAS GRACIAS" 839,38-
    // 10/04 949350 PTP - UDLA MAESTRÍA 1RE CARGO DIFERIDO (15/48) 20,57
    const m=l.match(/^(\d{2})\/(\d{2})\s+(\d+)\s+(.+?)\s+([\d,]+[.,]\d{2})-?\s*$/);
    if(m){
      const[,dd,mm,,desc,val]=m;
      const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0){
        const dU=desc.toUpperCase();
        let tipo='CONS';
        if(dU.includes('PAGO')||dU.includes('MUCHAS GRACIAS'))tipo='PAGO';
        else if(dU.includes('DIFERIDO'))tipo='DIF';
        else if(dU.includes('N/D')||dU.includes('IVA')||dU.includes('TARIFA'))tipo='ND';
        extB.push({banco:'Pichincha',fecha_tx:`${ANIO}-${mm}-${dd}`,concepto:desc.trim(),tipo_op:tipo,valor:v,categoria:acat(desc)});
      }
    }
    // SALDO ANTERIOR
    if(l.match(/SALDO\s+ANTERIOR/)){
      const mv=(lineas[i+1]||'').match(/^([\d,]+[.,]\d{2})/);
      if(mv){const v=parseFloat(mv[1].replace(',','.'));if(v>0) extB.push({banco:'Pichincha',fecha_tx:null,concepto:'SALDO ANTERIOR',tipo_op:'ND',valor:v,categoria:'Informativo'})}
    }
  }
}

function parsGen(lineas,banco){
  const re=/(\d{1,3}(?:[,\.]\d{3})*[,\.]\d{2})/g;
  for(const l of lineas){
    if(l.match(/^\d{2}[\/\-]\d{2}/)){
      const mm=l.match(re);if(mm){const v=parseFloat(mm[mm.length-1].replace(/,(?=\d{3})/g,'').replace(',','.'));
        if(v>0.5&&v<100000) extB.push({banco,fecha_tx:null,concepto:l.slice(0,60).trim(),tipo_op:'',valor:v,categoria:'Sin categoría'})}
    }
  }
}

// ── PARSER EXCEL ───────────────────────────────────────────
async function parseXLS(file){
  if(typeof XLSX==='undefined')return toast('⚠ Error cargando Excel. Recarga.',4000);
  const ab=await file.arrayBuffer();
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!rows.length)return;
  const header=rows[0].map(c=>String(c).toLowerCase());
  const isDanc=header.some(h=>h.includes('concepto')||h.includes('descripcion'));
  if(isDanc){
    for(let i=1;i<rows.length;i++){
      const r=rows[i];const f=r[0]?String(r[0]).slice(0,10):null;
      const c=String(r[1]||'').trim();const tipo=String(r[2]||'CONS').toUpperCase();
      const v=parseFloat(String(r[3]||'0').replace(/[,$]/g,''))||0;const cat=String(r[4]||'Sin categoría');
      if(c&&v>0) extB.push({banco:'Excel',fecha_tx:f,concepto:c,tipo_op:tipo,valor:v,categoria:cat});
    }
  }else{
    for(let i=1;i<rows.length;i++){
      const r=rows[i];const desc=r.find(c=>typeof c==='string'&&c.trim().length>3)||'';
      const val=r.find(c=>typeof c==='number'&&c>0&&c<1000000)||0;
      if(desc&&val) extB.push({banco:'Excel',fecha_tx:null,concepto:String(desc).trim().slice(0,80),tipo_op:'CONS',valor:val,categoria:acat(String(desc))});
    }
  }
}

// Categorización
const CM={UBER:'Transporte',TAXI:'Transporte',EDS:'Transporte',FUEL:'Transporte',GASOLINA:'Transporte',
  NETFLIX:'Suscripciones',SPOTIFY:'Suscripciones',AMAZON:'Suscripciones',CRUNCHYROLL:'Suscripciones',YOUTUBE:'Suscripciones',
  APPLE:'Suscripciones',DISNEY:'Suscripciones',GETHAPPYO:'Entretenimiento',
  METROCAR:'Vehículo',TALLER:'Vehículo',LLANTA:'Vehículo',ENZO:'Vehículo',
  MERCADO:'Alimentación',SUPERMAXI:'Alimentación',MCDONALDS:'Alimentación',KFC:'Alimentación',SIERRA:'Alimentación',
  SINNERS:'Entretenimiento',CINEMA:'Entretenimiento',
  CLINICA:'Salud',FARMACIA:'Salud',MEDICO:'Salud',HOSPITAL:'Salud',
  UDLA:'Educación',MAESTRIA:'Educación',COLEGIO:'Educación',
  MUNICIPIO:'Servicios',INTERNET:'Servicios',TUENTI:'Servicios',
  SMARTFIT:'Deportes',GYM:'Deportes',
  PAGO:'Pago','MUCHAS GRACIAS':'Pago','SALDO ANTERIOR':'Informativo'};
function acat(d){const u=d.toUpperCase();for(const[k,v]of Object.entries(CM))if(u.includes(k))return v;return 'Sin categoría'}

        </select></td>

  </div>`;
}

async function impExt(){
  const dest=document.querySelector('input[name=dest]:checked')?.value||'gastos';
  const uid=U.id;
  const sel=extB.map((r,i)=>{const ck=$(`#ck${i}`),cat=$(`#cat${i}`);
    if(!ck?.checked)return null;
    return{...r,usuario_id:uid,estado:'registrado',categoria:cat?cat.value:r.categoria,mes_periodo:MES,anio_periodo:ANIO}
  }).filter(Boolean);
  if(!sel.length)return toast('⚠ Selecciona al menos un movimiento');
  await SB.from('extractos').insert(sel);
  if(dest==='gastos'){
    const g=sel.filter(r=>r.tipo_op!=='PAGO'&&r.tipo_op!=='ND').map(r=>({
      usuario_id:uid,anio:anioV,mes:mesV,fecha:r.fecha_tx,concepto:r.concepto,
      valor:r.valor,categoria:r.categoria,naturaleza:'Necesidades',tipo:'variable',fuente:'importado',banco_origen:r.banco
    }));
    if(g.length)await SB.from('gastos').insert(g);
  }else if(dest==='ingresos'){
    const g=sel.filter(r=>r.tipo_op==='PAGO').map(r=>({usuario_id:uid,anio:anioV,mes:mesV,concepto:r.concepto,valor:r.valor,fecha:r.fecha_tx}));
    if(g.length)await SB.from('ingresos').insert(g);
  }
  toast(`✓ ${sel.length} movimientos importados a ${dest}`);
  $('#prev-ext').style.display='none';extB=[];$('#finp').value='';carHist();
}

// ── BOLA DE NIEVE ──────────────────────────────────────────
async function rN(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const{data:obls}=await SB.from('obligaciones').select('*,cuotas(valor_pagado,estado)').eq('deudor_id',uid).eq('estado','activa');
  const d=(obls||[]).map(o=>{const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    const s=Math.max(+o.monto_total-p,0);return{...o,saldo:s,cm:+o.valor_cuota||Math.ceil(s/12)||1}
  }).filter(x=>x.saldo>0.01).sort((a,b)=>a.saldo-b.saldo);
  const nuevo=!d.length;
  $('#main').innerHTML=`
  ${nuevo?`<div class="obc"><h3>❄️ Plan Bola de Nieve</h3>
  <p>El método Bola de Nieve ordena tus deudas de <b>menor a mayor saldo</b>. Pagas primero la más pequeña. Al liquidarla, esa cuota se suma a la siguiente, creando un efecto acelerador.<br><br>
  Registra primero tus obligaciones en la sección <b>Obligaciones</b> para activar este simulador.</p></div>`:''}
  <div class="card" style="margin-bottom:20px">
    <div class="ctit">Configurar aceleración</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Agrega un monto extra mensual además de tus cuotas regulares. Al pagar cada deuda, esa cuota se transfiere automáticamente a la siguiente.</p>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:180px">
        <label style="font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px">EXTRA MENSUAL ($)</label>
        <input type="number" id="sx" value="50" min="0" step="10" style="width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:15px;font-family:inherit;background:var(--cream)">
      </div>
      <button class="btn bfo" style="margin-top:18px" onclick="calcN()">Calcular plan</button>
    </div>
  </div>
  ${d.length?`<div class="card"><div class="ctit">Tu plan (${d.length} deudas activas)</div>
    <div class="tw"><table>
      <tr><th>Orden</th><th>Deuda</th><th>Saldo</th><th>Cuota/mes</th><th>Sin extra</th><th>Con bola de nieve</th></tr>
      ${d.map((o,i)=>`<tr><td><span class="badge bm">${i+1}</span></td><td><b>${o.nombre}</b></td>
        <td class="num neg">${fmt(o.saldo)}</td><td class="num">${fmt(o.cm)}</td>
        <td><span class="badge br">${o.cm>0?Math.ceil(o.saldo/o.cm):'+99'} meses</span></td>
        <td id="nb${i}"><span class="badge bm">— calcula →</span></td>
      </tr>`).join('')}
    </table></div>
    <div id="res-n" style="margin-top:16px"></div>
  </div>`:
  '<div class="empty"><p>No tienes deudas activas. ¡Excelente posición financiera! 🎉</p></div>'}`;
  window._dn=d;
}
function calcN(){
  const ex=+$('#sx').value||0;const d=window._dn;if(!d)return;
  let ac=ex,tot=0;
  d.forEach((o,i)=>{const ct=o.cm+ac;const m=ct>0?Math.ceil(o.saldo/ct):99;
    if(m>tot)tot=m;ac+=o.cm;
    const el=$(`#nb${i}`);if(el)el.innerHTML=`<span class="badge bg">${m>=99?'+99':m} meses</span>`;
  });
  const rn=$('#res-n');
  if(rn)rn.innerHTML=`<div style="background:var(--green-bg);border-radius:10px;padding:14px;font-size:13.5px;color:var(--green)">
    <b>Resultado:</b> Con ${fmt(ex)} extra/mes, tu deuda más larga se liquida en ~<b>${tot} meses</b>.
    Total mensual comprometido: ${fmt(d.reduce((a,o)=>a+o.cm,0)+ex)}.
  </div>`;
  toast('Plan calculado ✓');
}
