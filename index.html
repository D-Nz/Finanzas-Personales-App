<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --forest:#1a3a2a;--forest2:#254d38;--forest3:#2e6347;--sage:#5a8a6f;--mint:#a8d5b5;
  --cream:#f7f4ef;--cream2:#ede9e1;--warm:#d4c5a9;--gold:#c9a84c;--gold2:#b8942e;
  --card:#fff;--text:#1c2b22;--muted:#6b7f72;--border:#e0dbd0;
  --red:#d64e4e;--red-bg:#fdf0f0;--green:#2e7d52;--green-bg:#edf7f1;
  --amber:#b87c1a;--amber-bg:#fdf6e8;--blue:#2563eb;--blue-bg:#eff6ff;
  --r:14px;--sh:0 1px 3px rgba(26,58,42,.07),0 6px 20px rgba(26,58,42,.06);
  --shl:0 8px 32px rgba(26,58,42,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:\'Inter\',system-ui,sans-serif;background:var(--cream);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--warm);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.spin{width:32px;height:32px;border:3px solid var(--forest3);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--forest) 0%,var(--forest2) 50%,var(--forest3) 100%);padding:20px}
.auth-card{background:var(--card);border-radius:22px;padding:44px 40px;width:100%;max-width:420px;box-shadow:var(--shl)}
.brand-mark{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.brand-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--forest),var(--forest3));display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:26px;height:26px;fill:none;stroke:var(--mint);stroke-width:1.8}
.brand-name{font-size:19px;font-weight:700;color:var(--forest);letter-spacing:-.3px}
.brand-name em{font-style:normal;color:var(--gold)}.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
.atabs{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:26px}
.atab{flex:1;border:none;background:transparent;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)}
.atab.on{background:var(--forest);color:#fff}
.fld{margin-bottom:16px}.fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.fld input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14.5px;font-family:inherit;background:var(--cream);color:var(--text)}
.fld input:focus{outline:none;border-color:var(--forest3);background:#fff}
.fld2g{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btnp{width:100%;background:linear-gradient(135deg,var(--forest),var(--forest3));color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btnp:hover{filter:brightness(1.08)}.btnp:disabled{opacity:.6;cursor:not-allowed}
.amsg{padding:10px 13px;border-radius:8px;font-size:13.5px;margin-bottom:14px;display:none}
.amsg.err{background:var(--red-bg);color:var(--red);border:1px solid #f5c6c6;display:block}
.amsg.ok{background:var(--green-bg);color:var(--green);border:1px solid #b8dfc8;display:block}
.afoot{font-size:12px;color:var(--muted);text-align:center;margin-top:16px}
.danc{font-size:11px;color:var(--warm);text-align:center;margin-top:24px;letter-spacing:2px;font-weight:500}
#app-screen{display:none;min-height:100vh}
header{background:linear-gradient(135deg,var(--forest),var(--forest2));padding:0 24px;height:62px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(26,58,42,.2)}
.hbrand{display:flex;align-items:center;gap:10px;color:#fff}
.hico{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.hico svg{width:18px;height:18px;fill:none;stroke:var(--mint);stroke-width:1.8}
.htit{font-size:16px;font-weight:700;letter-spacing:-.2px;color:#fff}
.htit small{font-size:11px;font-weight:400;color:rgba(255,255,255,.5);margin-left:6px}
.hr{margin-left:auto;display:flex;align-items:center;gap:10px}
.hun{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.hav{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--forest);cursor:pointer}
.hout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.hout:hover{background:rgba(255,255,255,.2)}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:62px;z-index:40}
.nb{border:none;background:none;padding:14px 14px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nb:hover{color:var(--forest)}.nb.on{color:var(--forest);border-bottom-color:var(--gold)}
.nb svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8}
main{max-width:1240px;margin:0 auto;padding:24px 24px 80px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:22px}
.ctit{font-size:15px;font-weight:700;color:var(--forest);display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.sc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:18px 20px}
.sl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.sv{font-size:24px;font-weight:800;margin-top:5px;font-variant-numeric:tabular-nums}
.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{background:var(--cream);color:var(--muted);text-align:left;padding:9px 12px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.hv:hover{background:var(--cream)}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;display:inline-block;white-space:nowrap}
.bg{background:var(--green-bg);color:var(--green)}.br{background:var(--red-bg);color:var(--red)}
.ba{background:var(--amber-bg);color:var(--amber)}.bb{background:var(--blue-bg);color:var(--blue)}
.bm{background:var(--cream2);color:var(--muted)}
.t-CONS{background:#e8f5e9;color:#2e7d32}.t-DIF{background:#e3f2fd;color:#1565c0}
.t-PAGO{background:#fff3e0;color:#e65100}.t-ND{background:var(--cream2);color:var(--muted)}
.btn{border:none;border-radius:9px;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.12s}
.bfo{background:var(--forest);color:#fff}.bfo:hover{background:var(--forest2)}
.bgo{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--forest)}
.bgh{background:var(--cream);color:var(--muted);border:1.5px solid var(--border)}.bgh:hover{color:var(--forest);border-color:var(--sage)}
.bda{background:var(--red-bg);color:var(--red)}
.sm{padding:5px 11px;font-size:12px;border-radius:7px}.xs{padding:3px 8px;font-size:11px;border-radius:6px}
.pw{height:7px;background:var(--cream2);border-radius:4px;overflow:hidden;margin:8px 0}
.pb{height:100%;border-radius:4px;transition:width .6s ease}
.ff{margin-bottom:14px}
.ff label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.ff input,.ff select,.ff textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--text)}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--forest3);background:#fff}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.segtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.segtab{border:1.5px solid var(--border);background:var(--cream);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
.segtab:hover{border-color:var(--sage);color:var(--forest)}
.segtab.on{background:var(--forest);color:#fff;border-color:var(--forest)}
.mbg{position:fixed;inset:0;background:rgba(26,58,42,.5);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(3px);overflow-y:auto}
.mbg.on{display:flex}
.mbox{background:var(--card);border-radius:18px;padding:26px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto}
.mbox h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;color:var(--forest);position:sticky;top:0;background:var(--card);padding-bottom:10px;border-bottom:1px solid var(--border);z-index:1}
.mx{cursor:pointer;color:var(--muted);font-size:22px;font-weight:300;line-height:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.obl-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:18px;margin-bottom:10px;cursor:pointer;animation:fadein .3s ease;border-left:4px solid var(--sage);transition:.15s}
.obl-card:hover{box-shadow:var(--shl);transform:translateY(-1px)}
.obl-card.md{border-left-color:var(--green)}.obl-card.ld{border-left-color:var(--red)}
.chart-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:22px;position:relative;overflow:hidden}
.chart-card::before{content:\'\';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--forest),var(--gold))}
.chart-card-title{font-size:14px;font-weight:700;color:var(--forest);margin-bottom:4px}
.chart-card-sub{font-size:11.5px;color:var(--muted);margin-bottom:16px}
.chart-wrap{position:relative;height:200px}
.chart-legend{display:flex;flex-direction:column;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-label{flex:1;color:var(--text);font-weight:500}
.legend-pct{color:var(--muted);font-weight:700}
.part-row{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:9px;padding:9px 11px;margin-bottom:6px}
.part-row input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff}
.detail-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-item:last-child{border-bottom:none}
.detail-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dir-btn{flex:1;border:none;padding:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
@media(max-width:640px){.f2,.fld2g,.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}main{padding:14px 14px 70px}.mbox{padding:18px}.auth-card{padding:28px 20px}.nb{padding:12px 10px;font-size:12px}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="brand-mark">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg></div>
      <div><div class="brand-name">Finanzas <em>Personales</em></div><div class="brand-sub">Control inteligente de tus finanzas</div></div>
    </div>
    <div class="atabs"><button class="atab on" onclick="swTab(\'l\')">Ingresar</button><button class="atab" onclick="swTab(\'r\')">Registrarse</button></div>
    <div id="amsg" class="amsg"></div>
    <div id="tl">
      <div class="fld"><label>Correo</label><input type="email" id="le" placeholder="tu@correo.com" onkeydown="if(event.key===\'Enter\')doLogin()"></div>
      <div class="fld"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doLogin()"></div>
      <button class="btnp" onclick="doLogin()" id="blg">Ingresar a mi cuenta</button>
      <div class="afoot"><a href="#" onclick="doReset()" style="color:var(--forest3);font-weight:600">¿Olvidaste tu contraseña?</a></div>
    </div>
    <div id="tr" style="display:none">
      <div class="fld2g">
        <div class="fld"><label>Nombre</label><input type="text" id="rn" placeholder="Juan"></div>
        <div class="fld"><label>Apellido</label><input type="text" id="ra" placeholder="Pérez"></div>
      </div>
      <div class="fld"><label>Correo</label><input type="email" id="re" placeholder="tu@correo.com"></div>
      <div class="fld"><label>Contraseña (mín. 8 caracteres)</label><input type="password" id="rp" placeholder="••••••••"></div>
      <button class="btnp" onclick="doRegister()" id="brg">Crear mi cuenta gratuita</button>
    </div>
    <div class="danc">D · A · N · C</div>
  </div>
</div>
<div id="app-screen">
  <header>
    <div class="hbrand">
      <div class="hico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg></div>
      <div class="htit">Finanzas Personales <small>beta</small></div>
    </div>
    <div class="hr">
      <span class="hun" id="hun"></span>
      <div class="hav" id="hav" onclick="mPerfil()">?</div>
      <button class="hout" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <nav>
    <button class="nb on" data-v="resumen" onclick="goNav(this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Resumen</button>
    <button class="nb" data-v="presupuesto" onclick="goNav(this)"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke-linecap="round"/></svg>Presupuesto</button>
    <button class="nb" data-v="obligaciones" onclick="goNav(this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round"/></svg>Obligaciones</button>
    <button class="nb" data-v="ahorros" onclick="goNav(this)"><svg viewBox="0 0 24 24"><path d="M19 7V4a1 1 0 00-1-1H5a2 2 0 000 4h15a1 1 0 011 1v4h-3a2 2 0 000 4h3a1 1 0 001-1v-2a1 1 0 00-1-1" stroke-linecap="round"/><path d="M3 5v14a2 2 0 002 2h15a1 1 0 001-1v-4" stroke-linecap="round"/></svg>Ahorros</button>
    <button class="nb" data-v="extractos" onclick="goNav(this)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15" stroke-linecap="round"/></svg>Extractos</button>
    <button class="nb" data-v="nieve" onclick="goNav(this)"><svg viewBox="0 0 24 24"><path d="M2 12h20M12 2l-4 4m4-4l4 4M12 22l-4-4m4 4l4-4" stroke-linecap="round"/></svg>Nieve</button>
    <button class="nb" data-v="libros" onclick="goNav(this)"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke-linecap="round"/></svg>Libros</button>
    <button class="nb" data-v="qs" onclick="goNav(this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9" stroke-linecap="round"/></svg>Crédito QS</button>
  </nav>
  <main id="main"></main>
</div>
<div class="mbg" id="mbg"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// CORE — Supabase, estado global, utilidades
// ══════════════════════════════════════════════════════════
const SB = supabase.createClient(
  "https://dzlxyapzbdhfdundgcpm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6bHh5YXB6YmRoZmR1bmRnY3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzc1NzUsImV4cCI6MjA5ODA1MzU3NX0.3TugcXH-1amdvfnVcWHDwKftXRCDSPxV64DYL4XLgMU",
  {auth:{persistSession:true,storageKey:'fp-danc',autoRefreshToken:true,detectSessionInUrl:false}}
);

let U=null, P=null, V='resumen';
let mesV=new Date().getMonth()+1, anioV=new Date().getFullYear();
const MES=mesV, ANIO=anioV;
// Obligations state
let segV='Todos', vistaObl='lista', oblDir='me_deben', partsG=[];
// QS state
let qsMesSel=null, qsFiltro=null;

const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
const fmt=v=>'$ '+(+v||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const hoy=()=>new Date().toISOString().slice(0,10);
const mesN=m=>['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m-1];
const ff=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}):'—';
const ld=()=>'<div class="spin"></div>';
const SEGS=['Todos','Créditos Bancarios','Avances / Tarjetas','Préstamos Personales','Gastos Compartidos'];
const SEGCOL={'Créditos Bancarios':'#2563eb','Avances / Tarjetas':'#b87c1a','Préstamos Personales':'#2e7d52','Gastos Compartidos':'#5a8a6f'};

function toast(m,d=2400){const t=$('#toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),d)}
function openM(h){$('#mbox').innerHTML=h;$('#mbg').classList.add('on')}
function closeM(){$('#mbg').classList.remove('on')}
$('#mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeM()});

// ── AUTH ──────────────────────────────────────────────────
function swTab(t){
  $$('.atab').forEach((b,i)=>b.classList.toggle('on',i===(t==='l'?0:1)));
  $('#tl').style.display=t==='l'?'block':'none';
  $('#tr').style.display=t==='r'?'block':'none';
  $('#amsg').className='amsg';
}
function amsg(m,t='err'){const e=$('#amsg');e.textContent=m;e.className='amsg '+t}

async function doLogin(){
  const em=$('#le').value.trim(), pw=$('#lp').value;
  if(!em||!pw)return amsg('Ingresa correo y contraseña.');
  const btn=$('#blg');btn.disabled=true;btn.textContent='Verificando...';
  const{error}=await SB.auth.signInWithPassword({email:em,password:pw});
  if(error){amsg(error.message);btn.disabled=false;btn.textContent='Ingresar a mi cuenta'}
}
async function doRegister(){
  const n=$('#rn').value.trim(),a=$('#ra').value.trim(),e=$('#re').value.trim(),p=$('#rp').value;
  if(!n||!a||!e||!p)return amsg('Completa todos los campos.');

  const btn=$('#brg');btn.disabled=true;btn.textContent='Creando cuenta...';
  const{error}=await SB.auth.signUp({email:e,password:p,options:{data:{nombre:n,apellido:a}}});
  if(error){amsg(error.message);btn.disabled=false;btn.textContent='Crear mi cuenta gratuita'}
  else amsg('¡Cuenta creada! Intenta ingresar o revisa tu correo.','ok');

async function doReset(){const e=prompt('Ingresa tu correo:');if(e){await SB.auth.resetPasswordForEmail(e);amsg('Revisa tu correo.','ok')}}
async function doLogout(){await SB.auth.signOut()}

SB.auth.onAuthStateChange(async(ev,sess)=>{
  const blg=$('#blg');if(blg&&blg.disabled){blg.disabled=false;blg.textContent='Ingresar a mi cuenta'}

function mPerfil(){

async function savPerfil(){
  const n=$('#pn').value.trim(),a=$('#pa').value.trim();
  if(!n)return toast('⚠ Ingresa tu nombre');
  await SB.from('perfiles').upsert({id:U.id,nombre:n,apellido:a},{onConflict:'id'});
  P={...P,nombre:n,apellido:a};
  $('#hun').textContent=(n+' '+a).trim();
  $('#hav').textContent=n.charAt(0).toUpperCase();
  toast('Perfil actualizado ✓');closeM();
}
async function savPass(){
  const np=$('#np').value, np2=$('#np2').value;
  if(np.length<8)return toast('⚠ Mínimo 8 caracteres');
  if(np!==np2)return toast('⚠ Las contraseñas no coinciden');
  const{error}=await SB.auth.updateUser({password:np});
  if(error)return toast('Error: '+error.message);
  toast('Contraseña actualizada ✓');closeM();
}

// RESUMEN con gráficas profesionales
// ══════════════════════════════════════════════════════════
let chartPie=null, chartBar=null;

async function rR(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const[{data:ing},{data:gas},{data:obls}]=await Promise.all([
    SB.from('ingresos').select('valor').eq('usuario_id',uid).eq('anio',ANIO).eq('mes',MES),
    SB.from('gastos').select('valor,naturaleza,categoria').eq('usuario_id',uid).eq('anio',ANIO).eq('mes',MES),
    SB.from('obligaciones').select('*,cuotas(valor_pagado,estado)').or(`titular_id.eq.${uid},deudor_id.eq.${uid}`).eq('estado','activa')
  ]);
  const tI=(ing||[]).reduce((a,r)=>a+(+r.valor),0);
  const tG=(gas||[]).reduce((a,r)=>a+(+r.valor),0);
  const meDeben=(obls||[]).filter(o=>o.titular_id===uid).reduce((a,o)=>{
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    return a+Math.max(+o.monto_total-p,0);},0);

  const byCat={};
  (gas||[]).forEach(g=>{byCat[g.categoria]=(byCat[g.categoria]||0)+(+g.valor)});
  const catLabels=Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]).slice(0,8);
  const catVals=catLabels.map(k=>byCat[k]);
  const PALETTE=['#1a3a2a','#2e6347','#c9a84c','#5a8a6f','#8a6d3b','#a8d5b5','#b87c1a','#6b7f72'];

  const meses6=[],ingMes=[],gasMes=[];
  for(let i=5;i>=0;i--){
    const d=new Date(ANIO,MES-1-i,1);
    const m=d.getMonth()+1,y=d.getFullYear();
    meses6.push(mesN(m));
    const[{data:ii},{data:gg}]=await Promise.all([
      SB.from('ingresos').select('valor').eq('usuario_id',uid).eq('anio',y).eq('mes',m),
      SB.from('gastos').select('valor').eq('usuario_id',uid).eq('anio',y).eq('mes',m)
    ]);
    ingMes.push((ii||[]).reduce((a,r)=>a+(+r.valor),0));
    gasMes.push((gg||[]).reduce((a,r)=>a+(+r.valor),0));
  }

  $('#main').innerHTML=`
  <div style="font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px">${mesN(MES)} ${ANIO}</div>
  <div class="g3">
    <div class="sc"><div class="sl">Ingresos</div><div class="sv pos">${fmt(tI)}</div></div>
    <div class="sc"><div class="sl">Gastos</div><div class="sv ${tG>tI?'neg':'warn'}">${fmt(tG)}</div></div>
    <div class="sc"><div class="sl">Balance</div><div class="sv ${tI-tG>=0?'pos':'neg'}">${fmt(tI-tG)}</div></div>
    <div class="sc"><div class="sl">Me deben (total)</div><div class="sv pos">${fmt(meDeben)}</div></div>
  </div>
  <div class="g2" style="margin-bottom:20px">
    <div class="chart-card">
      <div class="chart-card-title">Distribución de gastos</div>
      <div class="chart-card-sub">Por categoría · ${mesN(MES)} ${ANIO}</div>
      ${catLabels.length
        ?`<div class="chart-wrap"><canvas id="cPie"></canvas></div><div id="pie-legend" class="chart-legend"></div>`
        :'<div class="empty"><p>Sin gastos registrados este mes.</p></div>'}
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Flujo de caja</div>
      <div class="chart-card-sub">Ingresos vs gastos · últimos 6 meses</div>
      <div class="chart-wrap"><canvas id="cBar"></canvas></div>
    </div>
  </div>
  ${(obls||[]).length?`<div class="card"><div class="ctit">Obligaciones activas <button class="btn bfo sm" onclick="goNav(document.querySelector('[data-v=obligaciones]'));rO()">Ver todas</button></div>
  <div class="tw"><table><tr><th>Concepto</th><th>Segmento</th><th>Persona</th><th>Saldo</th></tr>
  ${(obls||[]).slice(0,6).map(o=>{
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    const s=Math.max(+o.monto_total-p,0);
    return `<tr class="hv" data-oblid="${o.id}" data-esmio="${o.titular_id===uid}">
      <td><b>${o.nombre}</b></td>
      <td><span class="badge bm" style="font-size:10px">${o.segmento||'—'}</span></td>
      <td>${o.deudor_nombre||'—'}</td>
      <td class="num pos">${fmt(s)}</td></tr>`;
  }).join('')}</table></div></div>`:''}`;

  setTimeout(()=>{
    if(catLabels.length){
      const ctx=document.getElementById('cPie')?.getContext('2d');
      if(ctx){
        if(chartPie){try{chartPie.destroy()}catch(e){}}
        chartPie=new Chart(ctx,{type:'doughnut',data:{labels:catLabels,datasets:[{data:catVals,backgroundColor:PALETTE,borderWidth:3,borderColor:'#fff',hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a3a2a',padding:10,cornerRadius:8,callbacks:{label:c=>' '+c.label+': '+fmt(c.parsed)}}},animation:{duration:600}}});
        const tot=catVals.reduce((a,v)=>a+v,0);
        const leg=document.getElementById('pie-legend');
        if(leg)leg.innerHTML=catLabels.map((l,i)=>`<div class="legend-item"><span class="legend-dot" style="background:${PALETTE[i%8]}"></span><span class="legend-label">${l}</span><span class="legend-pct">${tot>0?((catVals[i]/tot)*100).toFixed(0):0}%</span></div>`).join('');
      }
    }
    const ctx2=document.getElementById('cBar')?.getContext('2d');
    if(ctx2){
      if(chartBar){try{chartBar.destroy()}catch(e){}}
      const gI=ctx2.createLinearGradient(0,0,0,200);gI.addColorStop(0,'rgba(46,99,71,.85)');gI.addColorStop(1,'rgba(46,99,71,.45)');
      const gG=ctx2.createLinearGradient(0,0,0,200);gG.addColorStop(0,'rgba(201,168,76,.85)');gG.addColorStop(1,'rgba(201,168,76,.4)');
      chartBar=new Chart(ctx2,{type:'bar',data:{labels:meses6,datasets:[
        {label:'Ingresos',data:ingMes,backgroundColor:gI,borderRadius:7,borderSkipped:false,maxBarThickness:26},
        {label:'Gastos',data:gasMes,backgroundColor:gG,borderRadius:7,borderSkipped:false,maxBarThickness:26}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',align:'end',labels:{font:{size:11,weight:'600'},boxWidth:9,boxHeight:9,usePointStyle:true,pointStyle:'circle',padding:14}},tooltip:{backgroundColor:'#1a3a2a',padding:10,cornerRadius:8,callbacks:{label:c=>' '+c.dataset.label+': '+fmt(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString(),font:{size:10},color:'var(--muted)'},grid:{color:'rgba(26,58,42,.05)'},border:{display:false}},x:{ticks:{font:{size:11,weight:'600'},color:'var(--muted)'},grid:{display:false},border:{display:false}}},animation:{duration:600}}});
    }
  },60);
}

  if(card && !e.target.closest('[data-action]') && !e.target.closest('button')){

// Acciones del modal de obligación
document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const action=btn.dataset.action;
  if(action==='close-modal') closeM();
  else if(action==='pagar-cuota') mPagCuota(btn.dataset.cuotaid,+btn.dataset.pend,CURRENT_OBL?.id);
  else if(action==='add-cuota') mAddCuota(CURRENT_OBL?.id);

    if(confirm('¿Eliminar esta obligación y todo su historial?'))

  else if(action==='reopen-obl') togObl(btn.dataset.id,'cerrada');
});

// ── Render lista obligaciones ─────────────────────────────
async function rO(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const{data:obls}=await SB.from('obligaciones')
    .select('*,cuotas(*)')
    .or(`titular_id.eq.${uid},deudor_id.eq.${uid}`)
    .order('created_at',{ascending:false});

  const pids=[...new Set((obls||[]).flatMap(o=>[o.titular_id,o.deudor_id]).filter(Boolean))];
  let pm={};
  if(pids.length){
    const{data:ps}=await SB.from('perfiles').select('id,nombre,apellido').in('id',pids);
    pm=Object.fromEntries((ps||[]).map(p=>[p.id,(p.nombre||'')+(p.apellido?' '+p.apellido:'')]));
  }

  const act=(obls||[]).filter(o=>o.estado==='activa');
  const cerr=(obls||[]).filter(o=>o.estado!=='activa');
  const filtAct=segV==='Todos'?act:act.filter(o=>(o.segmento||'')===segV);

  // todos los titulares=uid son "me deben" (incluye cuando titular=deudor=uid = autoregistrado)
  const meDeben=filtAct.filter(o=>o.titular_id===uid);
  const leDebo=filtAct.filter(o=>o.deudor_id===uid&&o.titular_id!==uid);

  function getPersona(o,esMio){
    if(esMio) return o.deudor_nombre||pm[o.deudor_id]||'—';
    return pm[o.titular_id]||'—';
  }
  function saldoObl(o){
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    return Math.max(+o.monto_total-p,0);
  }
  function oblCard(o,esMio){
    const sal=saldoObl(o);
    const pag=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    const pct=+o.monto_total>0?Math.min(pag/+o.monto_total*100,100):0;
    const persona=getPersona(o,esMio);
    const col=esMio?'var(--green)':'var(--red)';
    const segCol=SEGCOL[o.segmento||'']||'#5a8a6f';
    const cls='obl-card '+(esMio?'md':'ld');
    return `<div class="${cls}" data-oblid="${o.id}" data-esmio="${esMio}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:14.5px;margin-bottom:3px">${o.nombre}</div>
          <div style="font-size:12px;color:var(--muted)">${esMio?'← '+persona+' te debe':'→ Le debes a '+persona}</div>
          <span class="badge bm" style="font-size:10px;margin-top:5px;border-left:3px solid ${segCol}">${o.segmento||'—'}</span>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:20px;font-weight:800;color:${col}">${fmt(sal)}</div>
          <div style="font-size:10px;color:var(--muted)">pendiente</div>
        </div>
      </div>
      <div class="pw" style="margin-top:10px"><div class="pb" style="width:${pct}%;background:${col}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted)">
        <span>Pagado ${fmt(pag)} de ${fmt(+o.monto_total)}</span><span>${pct.toFixed(0)}%</span>
      </div>
    </div>`;
  }

  const tMD=meDeben.reduce((a,o)=>a+saldoObl(o),0);
  const tLD=leDebo.reduce((a,o)=>a+saldoObl(o),0);

  // Agrupación por persona para vista "Por persona"
  const porPersona={};
  meDeben.forEach(o=>{
    const nom=o.deudor_nombre||pm[o.deudor_id]||'Sin asignar';
    if(!porPersona[nom])porPersona[nom]={obls:[],saldo:0};
    porPersona[nom].obls.push(o);
    porPersona[nom].saldo+=saldoObl(o);
  });
  const personas=Object.keys(porPersona).sort((a,b)=>porPersona[b].saldo-porPersona[a].saldo);

  $('#main').innerHTML=`
  <div class="g3">
    <div class="sc"><div class="sl">Me deben</div><div class="sv pos">${fmt(tMD)}</div></div>
    <div class="sc"><div class="sl">Le debo</div><div class="sv neg">${fmt(tLD)}</div></div>
    <div class="sc"><div class="sl">Posición neta</div><div class="sv ${tMD-tLD>=0?'pos':'neg'}">${fmt(tMD-tLD)}</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div class="segtabs">
      ${SEGS.map(s=>`<button class="segtab ${segV===s?'on':''}" onclick="segV='${s}';rO()">${s}</button>`).join('')}
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn bgo sm" onclick="mNuevaObl()">＋ Nueva</button>
    </div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:16px">
    <button class="btn ${vistaObl==='lista'?'bfo':'bgh'} sm" onclick="vistaObl='lista';rO()">📋 Lista</button>
    <button class="btn ${vistaObl==='persona'?'bfo':'bgh'} sm" onclick="vistaObl='persona';rO()">👥 Por persona</button>
  </div>
  ${vistaObl==='persona'?`
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px">
    ${!personas.length?'<div class="empty"><p>Sin obligaciones activas.</p></div>':personas.map(nom=>{
      const grp=porPersona[nom];
      return `<div class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--forest);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">${nom.charAt(0).toUpperCase()}</div>
          <div style="flex:1"><div style="font-weight:700;font-size:14.5px">${nom}</div><div style="font-size:11px;color:var(--muted)">${grp.obls.length} obligación(es)</div></div>
          <div style="text-align:right"><div style="font-size:17px;font-weight:800;color:var(--green)">${fmt(grp.saldo)}</div></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          ${grp.obls.map(o=>`<div data-oblid="${o.id}" data-esmio="true" style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--cream);border-radius:8px;cursor:pointer;font-size:13px" class="hv">
            <span>${o.nombre}</span><b class="pos">${fmt(saldoObl(o))}</b>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`:`
  <div class="g2">
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px">← Me deben (${meDeben.length})</div>
      ${!meDeben.length?'<div class="empty"><p>Sin obligaciones.</p></div>':meDeben.map(o=>oblCard(o,true)).join('')}
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--red);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px">→ Le debo (${leDebo.length})</div>
      ${!leDebo.length?'<div class="empty"><p>Sin deudas.</p></div>':leDebo.map(o=>oblCard(o,false)).join('')}
    </div>
  </div>`}
  ${cerr.length?`<details style="margin-top:18px"><summary style="cursor:pointer;font-size:13px;color:var(--muted);font-weight:600;padding:8px 0">Ver ${cerr.length} cerrada(s)</summary>
  <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
    ${cerr.map(o=>{
      const sal=saldoObl(o);
      return `<div style="background:var(--cream);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:600;font-size:13.5px">${o.nombre}</div><div style="font-size:11.5px;color:var(--muted)">${o.deudor_nombre||'—'}</div></div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-weight:700;font-size:13px;color:var(--muted)">${fmt(sal)}</span>
          <button class="btn bgh xs" data-action="reopen-obl" data-id="${o.id}">Reabrir</button>
        </div>
      </div>`;
    }).join('')}
  </div></details>`:''}`;
}

// ── Modal detalle obligación ──────────────────────────────
async function vObl(id,esMio){
  openM(ld());
  const{data:o}=await SB.from('obligaciones').select('*,cuotas(*)').eq('id',id).single();
  CURRENT_OBL={...o,esMio};
  const pag=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
  const sal=Math.max(+o.monto_total-pag,0);
  const col=esMio?'var(--green)':'var(--red)';
  const segCol=SEGCOL[o.segmento||'']||'#5a8a6f';
  const pct=+o.monto_total>0?Math.min(pag/+o.monto_total*100,100):0;

  let h='';
  h+=`<h3>${o.nombre} <span class="mx" data-action="close-modal">×</span></h3>`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
  h+=`<span class="badge ${esMio?'bg':'br'}">${esMio?'Me deben':'Le debo'}</span>`;
  h+=`<span class="badge bm" style="border-left:3px solid ${segCol}">${o.segmento||'—'}</span>`;
  h+=`<span class="badge bm">${o.estado}</span>`;
  h+=`</div>`;
  if(o.deudor_nombre) h+=`<div style="font-size:13px;color:var(--muted);margin-bottom:12px">👤 <b>${o.deudor_nombre}</b></div>`;

  h+=`<div class="g3" style="margin-bottom:12px">`;
  h+=`<div style="background:var(--cream);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--muted)">TOTAL</div><div style="font-weight:800;font-size:17px">${fmt(+o.monto_total)}</div></div>`;
  h+=`<div style="background:var(--cream);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--muted)">PAGADO</div><div style="font-weight:800;font-size:17px;color:var(--green)">${fmt(pag)}</div></div>`;
  h+=`<div style="background:var(--cream);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--muted)">SALDO</div><div style="font-weight:800;font-size:17px;color:${col}">${fmt(sal)}</div></div>`;
  h+=`</div>`;
  h+=`<div class="pw"><div class="pb" style="width:${pct}%;background:${col}"></div></div>`;
  h+=`<div style="font-size:12px;color:var(--muted);margin-bottom:14px">${pct.toFixed(1)}% pagado</div>`;

  if(o.notas) h+=`<div style="background:var(--amber-bg);border-radius:8px;padding:10px 12px;font-size:12.5px;color:var(--amber);margin-bottom:14px;white-space:pre-line">${o.notas}</div>`;

  // Detalle completo de cuotas / historial
  const cuotas=(o.cuotas||[]).slice().sort((a,b)=>(a.numero||0)-(b.numero||0));
  h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">DETALLE DE CONCEPTOS Y PAGOS</div>`;

  if(!cuotas.length){
    h+=`<div class="empty"><p>Sin conceptos registrados.</p></div>`;
  } else {
    h+=`<div style="max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:10px">`;
    h+=`<table><tr><th>#</th><th>Concepto</th><th>Fecha</th><th>Esperado</th><th>Pagado</th><th>Estado</th>${esMio?'<th></th>':''}</tr>`;
    cuotas.forEach(c=>{
      const pend=Math.max((+c.valor_esperado||0)-(+c.valor_pagado||0),0);
      const estBadge=c.estado==='pagado'?'bg':c.estado==='revisar'?'ba':'br';
      const pagadoColor=c.estado==='pagado'?'pos':(+c.valor_pagado>0?'warn':'neg');
      h+=`<tr class="${c.estado!=='pagado'?'':''}">`;
      h+=`<td style="font-size:11.5px;color:var(--muted)">${c.numero||'—'}</td>`;
      h+=`<td><div style="font-weight:600;font-size:13px">${c.concepto}</div>`;
      if(c.nota) h+=`<div style="font-size:11px;color:var(--amber)">${c.nota}</div>`;
      h+=`</td>`;
      h+=`<td style="font-size:12px;white-space:nowrap">${c.fecha_prog?c.fecha_prog.slice(0,7):ff(c.fecha_pago)}</td>`;
      h+=`<td class="num" style="font-size:13px">${fmt(+c.valor_esperado)}</td>`;
      h+=`<td class="num ${pagadoColor}" style="font-size:13px"><b>${fmt(+c.valor_pagado)}</b></td>`;
      h+=`<td><span class="badge ${estBadge}" style="font-size:10px">${c.estado}</span></td>`;
      if(esMio){
        h+=`<td>${c.estado!=='pagado'
          ?`<button class="btn bfo xs" data-action="pagar-cuota" data-cuotaid="${c.id}" data-pend="${pend}">Pagar</button>`
          :'<span style="color:var(--green);font-size:16px">✓</span>'}</td>`;
      }
      h+=`</tr>`;
    });
    h+=`</table></div>`;
  }

  if(esMio){
    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">`;
    h+=`<button class="btn bfo sm" data-action="add-cuota">＋ Concepto</button>`;
    h+=`<button class="btn bgh sm" data-action="edit-obl">✏ Editar</button>`;
    h+=`<button class="btn bgh sm" data-action="toggle-obl">${o.estado==='activa'?'Cerrar':'Reabrir'}</button>`;
    h+=`<button class="btn bda sm" style="margin-left:auto" data-action="delete-obl">Eliminar</button>`;
    h+=`</div>`;
  } else {
    h+=`<p style="font-size:12px;color:var(--muted);margin-top:12px">Solo el titular puede registrar pagos.</p>`;
  }

  openM(h);
}

// ── Registrar pago en cuota ───────────────────────────────
function mPagCuota(cid,sug,oblId){
  openM(`<h3>Registrar pago <span class="mx" onclick="closeM()">×</span></h3>
  <div class="ff"><label>Valor a pagar ($)</label><input id="pv" type="number" step="0.01" value="${sug.toFixed(2)}"></div>
  <div class="ff"><label>Fecha del pago</label><input id="pf" type="date" value="${hoy()}"></div>
  <div class="ff"><label>Nota (transferencia, referencia, etc.)</label><input id="pn" placeholder="Opcional…"></div>
  <div class="ff"><label>Marcar como</label><select id="pe"><option value="pagado">Pagado completo</option><option value="pendiente">Abono parcial</option></select></div>
  <button class="btn bfo" style="width:100%" id="btn-sav-pag">Confirmar pago</button>`);
  document.getElementById('btn-sav-pag').onclick=async()=>{
    const v=+document.getElementById('pv').value;
    if(!v)return toast('⚠ Ingresa el valor');
    await SB.from('cuotas').update({
      valor_pagado:v,fecha_pago:document.getElementById('pf').value,
      nota:document.getElementById('pn').value,
      estado:document.getElementById('pe').value
    }).eq('id',cid);
    toast('Pago registrado ✓');
    if(oblId) vObl(oblId,true);else closeM();
    rO();
  };
}

async function savNuevaObl(){
  const nom=document.getElementById('on').value.trim();
  const m=+document.getElementById('om').value;
  const seg=document.getElementById('oseg').value;
  const nombreP=document.getElementById('onp').value.trim();
  const email=document.getElementById('oe').value.trim().toLowerCase();
  const f=document.getElementById('ofi').value;
  if(!nom||!m)return toast('⚠ Nombre y monto requeridos');
  const uid=U.id;

  // Si es "le debo", titular es el otro y yo soy deudor — modelado como titular=uid por ahora
  // con flag en deudor_nombre y notas para claridad
  const nota=(document.getElementById('ono').value||'')+(email?`\nDeudor: ${nombreP||email} (${email})`:'');

  const{data:obl,error}=await SB.from('obligaciones').insert({
    titular_id:uid,
    deudor_id:uid, // se actualiza cuando el deudor se registra y acepta
    nombre:nom,
    descripcion:seg,
    segmento:seg,
    deudor_nombre:nombreP,
    deudor_email:email,
    monto_total:m,
    fecha_inicio:f,
    num_cuotas:+document.getElementById('oq').value||null,
    valor_cuota:+document.getElementById('ovc').value||null,
    notas:nota,
    estado:'activa',
    es_deuda_propia:oblDir==='le_debo'  // flag para mostrar como "le debo"
  }).select().single();

  if(error)return toast('Error: '+error.message);

  const nc=+document.getElementById('oq').value;
  if(nc>0){
    const vc=+document.getElementById('ovc').value||m/nc;
    const[y,mo]=f.split('-').map(Number);
    const rows=[];
    for(let i=1;i<=nc;i++){
      const mm=(mo-1+(i-1))%12+1, yy=y+Math.floor((mo-1+(i-1))/12);
      rows.push({obligacion_id:obl.id,numero:i,concepto:`Cuota ${i}`,fecha_prog:`${yy}-${String(mm).padStart(2,'0')}-01`,valor_esperado:vc,valor_pagado:0,estado:'pendiente'});
    }
    await SB.from('cuotas').insert(rows);
  } else {
    await SB.from('cuotas').insert({obligacion_id:obl.id,numero:1,concepto:'Saldo pendiente',valor_esperado:m,valor_pagado:0,estado:'pendiente'});
  }

  if(email) await SB.from('invitaciones').insert({remitente_id:uid,destinatario_email:email,obligacion_id:obl.id}).catch(()=>{});

  toast('Obligación creada ✓'+(email?` — notificación pendiente a ${email}`:''));
  closeM();rO();
}

// ══════════════════════════════════════════════════════════
// CRÉDITO QS — filtro por responsable, tiempo real
// ══════════════════════════════════════════════════════════

async function rQS(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const{data:creditos}=await SB.from('qs_creditos')
    .select('*,qs_pagadores(*)')
    .eq('usuario_id',uid).eq('activo',true).order('responsable');

  if(!creditos?.length){
    $('#main').innerHTML='<div class="empty"><p>No hay créditos QS configurados.</p></div>';
    return;
  }

  const credIds=creditos.map(c=>c.id);
  const{data:pagos}=await SB.from('qs_pagos')
    .select('*').in('qs_credito_id',credIds).order('mes',{ascending:false});

  const pagadorMap={};
  creditos.forEach(c=>c.qs_pagadores.forEach(p=>{
    pagadorMap[p.id]={nombre:p.nombre,credito:c.responsable,creditoId:c.id,cuotaNom:+c.cuota_nominal};
  }));

  const resumen=creditos.map(c=>{
    const pp=(pagos||[]).filter(p=>p.qs_credito_id===c.id);
    const totalPagado=pp.reduce((a,p)=>a+(+p.valor),0);
    const saldo=Math.max(+c.capital_total-totalPagado,0);
    const pct=+c.capital_total>0?Math.min(totalPagado/+c.capital_total*100,100):0;
    return{...c,totalPagado,saldo,pct};
  });

  const granTotal=resumen.reduce((a,c)=>a+(+c.capital_total),0);
  const granPagado=resumen.reduce((a,c)=>a+c.totalPagado,0);
  const granSaldo=granTotal-granPagado;

  // Meses disponibles
  const hoy2=new Date();
  const mesesDisp=[];
  let cur=new Date(2025,4,1); // mayo 2025
  const lim=new Date(hoy2.getFullYear(),hoy2.getMonth()+3,1);
  while(cur<=lim){
    mesesDisp.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-01`);
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }
  if(!qsMesSel) qsMesSel=`${hoy2.getFullYear()}-${String(hoy2.getMonth()+1).padStart(2,'0')}-01`;

  // Crédito filtrado actualmente
  const credFiltrado=qsFiltro?creditos.find(c=>c.id===qsFiltro)||creditos[0]:null;

  let h='';
  // Tarjetas resumen
  h+=`<div class="g3" style="margin-bottom:20px">`;
  h+=`<div class="sc"><div class="sl">Capital total (4 créditos)</div><div class="sv">${fmt(granTotal)}</div></div>`;
  h+=`<div class="sc"><div class="sl">Total pagado</div><div class="sv pos">${fmt(granPagado)}</div></div>`;
  h+=`<div class="sc"><div class="sl">Saldo pendiente</div><div class="sv warn">${fmt(granSaldo)}</div></div>`;
  h+=`</div>`;

  // Tarjetas por responsable (clicables para filtrar)
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:22px">`;
  resumen.forEach(c=>{
    const sel=qsFiltro===c.id;
    h+=`<div class="card" style="cursor:pointer;border:2px solid ${sel?'var(--forest)':'var(--border)'}" onclick="qsFiltro='${c.id}';renderQSForm()">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start">`;
    h+=`<div><div style="font-weight:700;font-size:15px">${c.responsable}</div>`;
    h+=`<div style="font-size:11px;color:var(--muted);margin-top:2px">${c.qs_pagadores.map(p=>p.nombre).join(' + ')}</div></div>`;
    h+=`<div style="text-align:right"><div style="font-size:16px;font-weight:800;color:var(--amber)">${fmt(c.saldo)}</div>`;
    h+=`<div style="font-size:10px;color:var(--muted)">pendiente</div></div></div>`;
    h+=`<div class="pw" style="margin-top:8px"><div class="pb" style="width:${c.pct}%;background:var(--forest3)"></div></div>`;
    h+=`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">`;
    h+=`<span>${fmt(c.totalPagado)} de ${fmt(+c.capital_total)}</span><span>${c.pct.toFixed(0)}%</span></div>`;
    h+=`</div>`;
  });
  h+=`</div>`;

  // Panel de registro
  h+=`<div class="card" style="margin-bottom:20px" id="qs-registro-panel">`;
  h+=`<div class="ctit">Registrar pagos del mes</div>`;
  h+=`<div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px">`;
  h+=`<div class="ff" style="flex:1;min-width:160px;margin-bottom:0"><label>Mes</label>`;
  h+=`<select id="qs-mes-sel">`;
  mesesDisp.slice().reverse().forEach(m=>{
    const d=new Date(m+'T12:00:00');
    h+=`<option value="${m}" ${m===qsMesSel?'selected':''}>${mesN(d.getMonth()+1)} ${d.getFullYear()}</option>`;
  });
  h+=`</select></div>`;
  h+=`<div class="ff" style="flex:1;min-width:160px;margin-bottom:0"><label>Crédito / responsable</label>`;
  h+=`<select id="qs-cred-sel">`;
  h+=`<option value="">— Todos —</option>`;
  creditos.forEach(c=>{
    h+=`<option value="${c.id}" ${qsFiltro===c.id?'selected':''}>${c.responsable}</option>`;
  });
  h+=`</select></div>`;
  h+=`</div>`;
  h+=`<div id="qs-form-mes"></div>`;
  h+=`</div>`;

  // Tabla histórica
  h+=`<div class="card">`;
  h+=`<div class="ctit">Histórico completo`;
  if(qsFiltro){
    const cred=creditos.find(c=>c.id===qsFiltro);
    h+=` — <span class="badge bb">${cred?.responsable||''}</span>`;
    h+=` <button class="btn bgh xs" onclick="qsFiltro=null;rQS()">Ver todos</button>`;
  }
  h+=`</div>`;

  const pagosVis=qsFiltro?(pagos||[]).filter(p=>p.qs_credito_id===qsFiltro):(pagos||[]);

  h+=`<div class="tw" style="max-height:400px;overflow-y:auto">`;
  h+=`<table><tr><th>Mes</th><th>Crédito</th><th>Pagador</th><th class="num">Valor</th><th></th></tr>`;
  pagosVis.forEach(p=>{
    const pi=pagadorMap[p.qs_pagador_id]||{};
    const d=new Date(p.mes+'T12:00:00');
    h+=`<tr><td style="font-size:12px;white-space:nowrap">${mesN(d.getMonth()+1)} ${d.getFullYear()}</td>`;
    h+=`<td><span class="badge bm" style="font-size:10px">${pi.credito||'?'}</span></td>`;
    h+=`<td>${pi.nombre||'?'}</td>`;
    h+=`<td class="num pos"><b>${fmt(p.valor)}</b></td>`;
    h+=`<td><button class="btn bgh xs" data-action="qs-edit" data-id="${p.id}" data-val="${p.valor}" data-pag="${pi.nombre||''}">✏</button></td></tr>`;
  });
  if(!pagosVis.length) h+=`<tr><td colspan="5" class="empty">Sin pagos registrados.</td></tr>`;
  h+=`</table></div></div>`;

  $('#main').innerHTML=h;

  // Event listeners
  document.getElementById('qs-mes-sel').addEventListener('change',e=>{qsMesSel=e.target.value;renderQSForm()});
  document.getElementById('qs-cred-sel').addEventListener('change',e=>{qsFiltro=e.target.value||null;renderQSForm()});

  renderQSForm();

  function renderQSForm(){
    // Actualizar el select si vino desde tarjeta
    const sel=document.getElementById('qs-cred-sel');
    if(sel&&qsFiltro) sel.value=qsFiltro;
    else if(sel&&!qsFiltro) sel.value='';

    const fm=document.getElementById('qs-form-mes');
    if(!fm)return;
    const credsAMostrar=qsFiltro?creditos.filter(c=>c.id===qsFiltro):creditos;
    let fh=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">`;
    credsAMostrar.forEach(c=>{
      c.qs_pagadores.forEach(pg=>{
        const pago=(pagos||[]).find(p=>p.qs_pagador_id===pg.id&&p.mes===qsMesSel);
        const yaRegistrado=!!pago;
        fh+=`<div style="background:${yaRegistrado?'var(--green-bg)':'var(--cream)'};border-radius:10px;padding:12px;border:1.5px solid ${yaRegistrado?'var(--green)':'var(--border)'}">`;
        fh+=`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">${c.responsable} — ${pg.nombre}</div>`;
        if(yaRegistrado) fh+=`<div style="font-size:11px;color:var(--green);margin-bottom:6px">✓ Registrado: ${fmt(pago.valor)}</div>`;
        fh+=`<div style="display:flex;gap:6px;align-items:center">`;
        fh+=`<input type="number" step="0.01" id="qsv-${pg.id}" value="${pago?pago.valor:''}" placeholder="${(+c.cuota_nominal/c.qs_pagadores.filter(x=>x.qs_credito_id===c.id).length).toFixed(2)}" style="flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:13px;background:#fff">`;
        fh+=`<button class="btn bfo xs" data-action="qs-guardar" data-pagadorid="${pg.id}" data-creditoid="${c.id}">${yaRegistrado?'Actualizar':'Guardar'}</button>`;
        fh+=`</div></div>`;
      });
    });
    fh+=`</div>`;
    fm.innerHTML=fh;
  }
}

// LIBROS — tabla dedicada, editar, convertir a obligación
// ══════════════════════════════════════════════════════════
async function rL(){
  $('#main').innerHTML=ld();
  const{data:libs}=await SB.from('libros').select('*,libro_movimientos(*)')
    .eq('usuario_id',U.id).eq('activo',true).order('created_at');
  function saldoLib(l){return (l.libro_movimientos||[]).reduce((a,m)=>a+(+m.valor),0)}
  const tL=(libs||[]).reduce((a,l)=>a+saldoLib(l),0);

  $('#main').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <div>
      <h2 style="font-size:16px;font-weight:700">Libros contables</h2>
      <p style="font-size:12.5px;color:var(--muted);margin-top:3px">Registros históricos de fondos y préstamos no activos. Conviértelos en obligación cuando decidas cobrarlos.</p>
    </div>
    <button class="btn bgo" onclick="mNLib()">＋ Nuevo</button>
  </div>
  <div class="g3" style="margin-bottom:20px">
    <div class="sc"><div class="sl">Total en libros</div><div class="sv ${tL>=0?'pos':'neg'}">${fmt(Math.abs(tL))}<span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">${tL<0?'negativo':''}</span></div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">
    ${!libs?.length?'<div class="empty" style="grid-column:1/-1"><p>No hay libros registrados.</p></div>':''}
    ${(libs||[]).map(lib=>{
      const sal=saldoLib(lib);
      const movs=(lib.libro_movimientos||[]).slice().sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
      let h='<div class="card">';
      h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">`;
      h+=`<div><div style="font-weight:700;font-size:15px">${lib.nombre}</div>`;
      if(lib.descripcion)h+=`<div style="font-size:11.5px;color:var(--muted);margin-top:2px">${lib.descripcion}</div>`;
      h+=`</div>`;
      h+=`<div style="font-size:19px;font-weight:800;color:${sal>=0?'var(--green)':'var(--red)'};text-align:right">`;
      h+=fmt(Math.abs(sal))+`<div style="font-size:10px;color:var(--muted);font-weight:400">${sal<0?'negativo':'saldo'}</div></div></div>`;
      h+=`<div style="max-height:160px;overflow-y:auto;margin-bottom:10px">`;
      if(movs.length){
        h+=`<table><tr><th>Fecha</th><th>Concepto</th><th class="num">Monto</th></tr>`;
        movs.slice(0,15).forEach(m=>{
          h+=`<tr><td style="font-size:11.5px">${ff(m.fecha)}</td>`;
          h+=`<td style="font-size:12px;color:var(--muted)">${m.concepto||'—'}</td>`;
          h+=`<td class="num ${+m.valor>=0?'pos':'neg'}" style="font-size:12px">${fmt(+m.valor)}</td></tr>`;
        });
        h+=`</table>`;
      } else h+=`<div style="text-align:center;color:var(--muted);padding:10px;font-size:12.5px">Sin movimientos aún</div>`;
      h+=`</div>`;
      h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
      h+=`<button class="btn bfo xs" data-action="lib-add" data-libroid="${lib.id}">＋ Movimiento</button>`;
      h+=`<button class="btn bgh xs" data-action="lib-edit" data-libroid="${lib.id}" data-nombre="${lib.nombre.replace(/"/g,'&quot;')}" data-desc="${(lib.descripcion||'').replace(/"/g,'&quot;')}">✏ Editar</button>`;
      h+=`<button class="btn bgh xs" data-action="lib-toobl" data-libroid="${lib.id}" data-nombre="${lib.nombre.replace(/"/g,'&quot;')}" data-saldo="${Math.abs(sal)}">→ Obligación</button>`;
      h+=`<button class="btn bda xs" data-action="lib-del" data-libroid="${lib.id}" style="margin-left:auto">✕</button>`;
      h+=`</div></div>`;
      return h;
    }).join('')}
  </div>`;
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-action^="lib-"]');
  if(!btn)return;
  const action=btn.dataset.action, id=btn.dataset.libroid;
  if(action==='lib-add') mAddMovLib(id);
  else if(action==='lib-edit') mEditLib(id,btn.dataset.nombre,btn.dataset.desc);
  else if(action==='lib-toobl') mLibToObl(id,btn.dataset.nombre,+btn.dataset.saldo);
  else if(action==='lib-del'){
    if(confirm('¿Eliminar este libro y todo su historial?'))
      SB.from('libros').delete().eq('id',id).then(rL);
  }
});

async function procExt(e){
  const file=e.target.files[0];if(!file)return;
  extB=[];toast('Procesando…',3000);

async function parsePDF(file){
  if(typeof pdfjsLib==='undefined')return toast('⚠ Error cargando pdf.js',4000);
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const ab=await file.arrayBuffer();
  let allLines=[];
  try{
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      const byY={};
      tc.items.forEach(item=>{
        const y=Math.round(item.transform[5]);
        if(!byY[y])byY[y]=[];
        byY[y].push({x:item.transform[4],t:item.str});
      });
      Object.keys(byY).sort((a,b)=>b-a).forEach(y=>{
        const linea=byY[y].sort((a,b)=>a.x-b.x).map(i=>i.t).join(' ').trim();
        if(linea)allLines.push(linea);
      });
    }
  }catch(e){toast('⚠ Error leyendo PDF: '+e.message,4000);return}
  const texto=allLines.join('\n');
  const banco=detBanco(texto);
  if(banco==='PacifiCard') parsPC(allLines);
  else if(banco==='Diners'||banco==='Discover') parsDC(allLines,banco);
  else if(banco==='Pichincha') parsPI(allLines);
  else{toast('Banco no reconocido. Usa la plantilla Excel.',4000);parsGen(allLines,banco)}
}
function detBanco(t){
  if(t.includes('PACIFICARD')||t.includes('PacifiCard')||t.includes('intermatico'))return 'PacifiCard';
  if(t.includes('DINERS CLUB')||t.includes('dinersclub')||t.includes('Diners Club'))return 'Diners';
  if(t.includes('DISCOVER')||t.includes('discover.ec'))return 'Discover';
  if(t.includes('BANCO PICHINCHA')||t.includes('pichincha.com')||t.includes('VISA PLATINUM'))return 'Pichincha';
  return 'Desconocido';
}
const MESES2={ENE:1,FEB:2,MAR:3,ABR:4,MAY:5,JUN:6,JUL:7,AGO:8,SEP:9,OCT:10,NOV:11,DIC:12};
function parsPC(lineas){
  let sec=false;
  const re=/^([A-Z]{3})\/(\d{1,2})\s+(\d+)\s+(.+?)\s+(?:(\d{1,2})\/(\d{1,2})\s+)?(CONS|DIF|PAGO|N\/D|AV)\s+([\d,\.]+)/;
  for(const l of lineas){
    if(l.includes('DETALLE DE MOVIMIENTOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('TOTAL PAGO DE CONTADO')||l.includes('CONCEPTOS BÁSICOS'))break;
    const m=re.exec(l);
    if(m){
      const[,mes,dia,,desc,cn,ct,tipo,val]=m;
      const mn=MESES2[mes]||MES;
      const v=parseFloat(val.replace(/,(?=\d{3})/g,'').replace(',','.'));
      const cuota=cn?` (${cn}/${ct})`:'';
      if(v>0)extB.push({banco:'PacifiCard',fecha_tx:`${ANIO}-${String(mn).padStart(2,'0')}-${String(dia).padStart(2,'0')}`,concepto:(desc.trim().replace(/\s+/g,' '))+cuota,tipo_op:tipo,valor:v,categoria:acat(desc)});
    }
  }
}
function parsDC(lineas,banco){
  let sec=false;
  const re=/(\d{2})\/(\d{2})\s+(\d+)\s+(.+?)\s{2,}(?:\((\d+)\/(\d+)\)\s+)?([\d,\.]+)(?:\s*-|\s*$)/;
  for(const l of lineas){
    if(l.includes('Consumo período actual')||l.includes('Detalle débitos y créditos')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('Información de tarifas')||l.includes('Comprobante de venta'))break;
    const m=re.exec(l);
    if(m){
      const[,dd,mm,,desc,c1,c2,val]=m;
      const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0&&v<50000){
        const dU=desc.toUpperCase();
        let tipo=c1?'DIF':'CONS';
        if(dU.includes('PAGO')||dU.includes('MUCHAS GRACIAS'))tipo='PAGO';
        else if(dU.includes('IVA')||dU.includes('SOLCA'))tipo='ND';
        const cuota=c1?` (${c1}/${c2})`:'';
        extB.push({banco,fecha_tx:`${ANIO}-${mm}-${dd}`,concepto:(desc.trim().replace(/\s+/g,' '))+cuota,tipo_op:tipo,valor:v,categoria:acat(desc)});
      }
    }
  }
}
function parsPI(lineas){
  let sec=false;
  const reMain=/^(\d{2})\/(\d{2})\s+(\d+)\s+(.+?)\s+(DIFERIDO|CONSUMO|N\/D|PAGO)\s*(?:\((\d+)\/(\d+)\))?(?:\s+[A-Z]{2,3}\b)?\s+([\d.,]+)/;
  const rePago=/^(\d{2})\/(\d{2})\s+(\d+)\s+(SU PAGO.+?)\s+([\d.,]+)-\s*$/;
  for(const l of lineas){
    if(l.includes('DETALLE DE MOVIMIENTOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('TOTAL CONSUMOS MES')||l.includes('INFORMACIÓN FINANCIERA')||l.includes('GLOSARIO'))break;
    if(l.includes('SUBTOTAL'))continue;
    const mp=rePago.exec(l);
    if(mp){const[,dd,mm,,desc,val]=mp;const v=parseFloat(val.replace(/\./g,'').replace(',','.'));if(v>0)extB.push({banco:'Pichincha',fecha_tx:`${ANIO}-${mm}-${dd}`,concepto:desc.trim(),tipo_op:'PAGO',valor:v,categoria:'Pago'});continue}
    const m=reMain.exec(l);
    if(m){
      const[,dd,mm,,desc,op,cn,ct,val]=m;
      const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0){
        let tipo='CONS';if(op==='DIFERIDO')tipo='DIF';else if(op==='N/D')tipo='ND';else if(op==='PAGO')tipo='PAGO';
        const cuota=cn?` (${cn}/${ct})`:'';
        extB.push({banco:'Pichincha',fecha_tx:`${ANIO}-${mm}-${dd}`,concepto:(desc.trim().replace(/\s+/g,' ').replace(/\s+Q\s*$/,''))+cuota,tipo_op:tipo,valor:v,categoria:acat(desc)});
      }
    }
  }
}
function parsGen(lineas,banco){
  const re=/(\d{1,3}(?:[,\.]\d{3})*[,\.]\d{2})/g;
  for(const l of lineas){
    if(l.match(/^\d{2}[\/\-]\d{2}/)){
      const mm=l.match(re);if(mm){const v=parseFloat(mm[mm.length-1].replace(/,(?=\d{3})/g,'').replace(',','.'));
        if(v>0.5&&v<100000)extB.push({banco,fecha_tx:null,concepto:l.slice(0,60).trim(),tipo_op:'',valor:v,categoria:'Sin categoría'})}
    }
  }
}
async function parseXLS(file){
  if(typeof XLSX==='undefined')return toast('⚠ Error cargando Excel',4000);
  const ab=await file.arrayBuffer();const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(!rows.length)return;
  const header=rows[0].map(c=>String(c).toLowerCase());
  const isDanc=header.some(h=>h.includes('concepto')||h.includes('descripcion'));
  if(isDanc){for(let i=1;i<rows.length;i++){const r=rows[i];const f=r[0]?String(r[0]).slice(0,10):null;
    const c=String(r[1]||'').trim();const tipo=String(r[2]||'CONS').toUpperCase();
    const v=parseFloat(String(r[3]||'0').replace(/[,$]/g,''))||0;const cat=String(r[4]||'Sin categoría');
    if(c&&v>0)extB.push({banco:'Excel',fecha_tx:f,concepto:c,tipo_op:tipo,valor:v,categoria:cat})}}
  else{for(let i=1;i<rows.length;i++){const r=rows[i];
    const desc=r.find(c=>typeof c==='string'&&c.trim().length>3)||'';
    const val=r.find(c=>typeof c==='number'&&c>0&&c<1000000)||0;
    if(desc&&val)extB.push({banco:'Excel',fecha_tx:null,concepto:String(desc).trim().slice(0,80),tipo_op:'CONS',valor:val,categoria:acat(String(desc))})}}
}
const CM={UBER:'Transporte',TAXI:'Transporte',EDS:'Transporte',GASOLINA:'Transporte',METROCAR:'Vehículo',TALLER:'Vehículo',NETFLIX:'Suscripciones',SPOTIFY:'Suscripciones',AMAZON:'Suscripciones',CRUNCHYROLL:'Suscripciones',YOUTUBE:'Suscripciones',DISNEY:'Suscripciones',MERCADO:'Alimentación',SUPERMAXI:'Alimentación',MCDONALDS:'Alimentación',KFC:'Alimentación',CLINICA:'Salud',FARMACIA:'Salud',HOSPITAL:'Salud',UDLA:'Educación',MUNICIPIO:'Servicios',INTERNET:'Servicios',TUENTI:'Servicios',SMARTFIT:'Deportes',PAGO:'Pago'};

    <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">
      <div class="ff" style="flex:1;min-width:160px;margin-bottom:0"><label>Extra mensual ($)</label>
        <input type="number" id="sx" value="50" min="0" step="10" style="width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:15px;font-family:inherit;background:var(--cream)">
      </div>
      <button class="btn bfo" onclick="calcN()">Calcular plan</button>
    </div>
  </div>
  ${d.length?`<div class="card"><div class="ctit">Plan de pago (${d.length} obligaciones)</div>
    <div class="tw"><table>
      <tr><th>#</th><th>Obligación</th><th>Segmento</th><th>Saldo</th><th>Cuota/mes</th><th>Sin extra</th><th>Con bola de nieve</th></tr>
      ${d.map((o,i)=>`<tr><td><span class="badge bm">${i+1}</span></td>
        <td><b>${o.nombre}</b><div style="font-size:11px;color:var(--muted)">${o.deudor_nombre||''}</div></td>
        <td><span class="badge bm" style="font-size:10px">${o.segmento||'—'}</span></td>
        <td class="num neg">${fmt(o.saldo)}</td><td class="num">${fmt(o.cm)}</td>
        <td><span class="badge br">${o.cm>0?Math.ceil(o.saldo/o.cm):'+99'} meses</span></td>
        <td id="nb${i}"><span class="badge bm">— calcula →</span></td></tr>`).join('')}
    </table></div>
    <div id="res-n" style="margin-top:14px"></div>
  </div>`:'<div class="empty"><p>No tienes obligaciones activas. ¡Excelente posición! 🎉</p></div>'}`;
  window._dn=d;
}
function calcN(){
  const ex=+document.getElementById('sx').value||0;const d=window._dn;if(!d)return;
  let ac=ex,tot=0;
  d.forEach((o,i)=>{const ct=o.cm+ac;const m=ct>0?Math.ceil(o.saldo/ct):99;
    if(m>tot)tot=m;ac+=o.cm;
    const el=document.getElementById('nb'+i);if(el)el.innerHTML=`<span class="badge bg">${m>=99?'+99':m} meses</span>`;
  });
  const rn=document.getElementById('res-n');
  if(rn)rn.innerHTML=`<div style="background:var(--green-bg);border-radius:10px;padding:13px;color:var(--green);font-size:13.5px">
    <b>Resultado:</b> Con ${fmt(ex)} extra/mes, deuda más larga: ~<b>${tot} meses</b>. Total mensual: <b>${fmt(d.reduce((a,o)=>a+o.cm,0)+ex)}</b>.
  </div>`;
  toast('Plan calculado ✓');
}

</script>
</body>
</html>
