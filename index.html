<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Personales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--forest:#1a3a2a;--forest2:#254d38;--forest3:#2e6347;--sage:#5a8a6f;--mint:#a8d5b5;--cream:#f7f4ef;--cream2:#ede9e1;--warm:#d4c5a9;--gold:#c9a84c;--gold2:#b8942e;--card:#fff;--text:#1c2b22;--muted:#6b7f72;--border:#e0dbd0;--red:#d64e4e;--red-bg:#fdf0f0;--green:#2e7d52;--green-bg:#edf7f1;--amber:#b87c1a;--amber-bg:#fdf6e8;--blue:#2563eb;--blue-bg:#eff6ff;--r:14px;--sh:0 1px 3px rgba(26,58,42,.07),0 6px 20px rgba(26,58,42,.06);--shl:0 8px 32px rgba(26,58,42,.14)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--warm);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.spin{width:32px;height:32px;border:3px solid var(--forest3);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--forest) 0%,var(--forest2) 50%,var(--forest3) 100%);padding:20px}
.auth-card{background:var(--card);border-radius:22px;padding:44px 40px;width:100%;max-width:420px;box-shadow:var(--shl)}
.brand-mark{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.brand-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--forest),var(--forest3));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:26px;height:26px;fill:none;stroke:var(--mint);stroke-width:1.8}
.brand-name{font-size:19px;font-weight:700;color:var(--forest);letter-spacing:-.3px;line-height:1.2}
.brand-name em{font-style:normal;color:var(--gold)}.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
.atabs{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:26px}
.atab{flex:1;border:none;background:transparent;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)}
.atab.on{background:var(--forest);color:#fff}
.fld{margin-bottom:18px}.fld label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.fld input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14.5px;font-family:inherit;background:var(--cream);color:var(--text)}
.fld input:focus{outline:none;border-color:var(--forest3);background:#fff}
.fld2g{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btnp{width:100%;background:linear-gradient(135deg,var(--forest),var(--forest3));color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.btnp:hover{filter:brightness(1.08)}.btnp:disabled{opacity:.6;cursor:not-allowed}
.amsg{padding:10px 13px;border-radius:8px;font-size:13.5px;margin-bottom:14px;display:none}
.amsg.err{background:var(--red-bg);color:var(--red);border:1px solid #f5c6c6;display:block}
.amsg.ok{background:var(--green-bg);color:var(--green);border:1px solid #b8dfc8;display:block}
.afoot{font-size:12px;color:var(--muted);text-align:center;margin-top:16px}
.danc{font-size:11px;color:var(--warm);text-align:center;margin-top:24px;letter-spacing:2px;font-weight:500}
#app-screen{display:none;min-height:100vh}
header{background:linear-gradient(135deg,var(--forest),var(--forest2));padding:0 24px;height:62px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(26,58,42,.2)}
.hbrand{display:flex;align-items:center;gap:10px;color:#fff}
.hico{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.hico svg{width:18px;height:18px;fill:none;stroke:var(--mint);stroke-width:1.8}
.htit{font-size:16px;font-weight:700;letter-spacing:-.2px;color:#fff}
.htit small{font-size:11px;font-weight:400;color:rgba(255,255,255,.5);margin-left:6px}
.hr{margin-left:auto;display:flex;align-items:center;gap:10px}
.hun{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
.hav{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--forest)}
.hout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.hout:hover{background:rgba(255,255,255,.2)}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:62px;z-index:40}
.nb{border:none;background:none;padding:14px 15px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nb:hover{color:var(--forest)}.nb.on{color:var(--forest);border-bottom-color:var(--gold)}
.nb svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8}
main{max-width:1200px;margin:0 auto;padding:26px 24px 80px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:22px}
.ctit{font-size:15px;font-weight:700;color:var(--forest);display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.sc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:20px 22px}
.sl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.sv{font-size:26px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.sh2{font-size:12px;color:var(--muted);margin-top:3px}
.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{background:var(--cream);color:var(--muted);text-align:left;padding:10px 12px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.hv:hover{background:var(--cream)}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;display:inline-block;white-space:nowrap}
.bg{background:var(--green-bg);color:var(--green)}.br{background:var(--red-bg);color:var(--red)}
.ba{background:var(--amber-bg);color:var(--amber)}.bb{background:var(--blue-bg);color:var(--blue)}
.bm{background:var(--cream2);color:var(--muted)}
.t-CONS{background:#e8f5e9;color:#2e7d32}.t-DIF{background:#e3f2fd;color:#1565c0}
.t-PAGO{background:#fff3e0;color:#e65100}.t-ND{background:var(--cream2);color:var(--muted)}
.btn{border:none;border-radius:9px;padding:8px 15px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.bfo{background:var(--forest);color:#fff}.bfo:hover{background:var(--forest2)}
.bgo{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--forest)}
.bgh{background:var(--cream);color:var(--muted);border:1.5px solid var(--border)}.bgh:hover{color:var(--forest)}
.bda{background:var(--red-bg);color:var(--red)}
.sm{padding:5px 11px;font-size:12px;border-radius:7px}.xs{padding:3px 8px;font-size:11px;border-radius:6px}
.pw{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden;margin:8px 0}
.pb{height:100%;border-radius:4px;transition:width .5s ease}
.ff{margin-bottom:16px}
.ff label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.ff input,.ff select,.ff textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--text)}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--forest3);background:#fff}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.segtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.segtab{border:1.5px solid var(--border);background:var(--cream);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.segtab:hover{border-color:var(--sage);color:var(--forest)}
.segtab.on{background:var(--forest);color:#fff;border-color:var(--forest)}
.mbg{position:fixed;inset:0;background:rgba(26,58,42,.5);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(3px);overflow-y:auto}
.mbg.on{display:flex}
.mbox{background:var(--card);border-radius:18px;padding:28px;width:100%;max-width:600px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto;position:relative}
.mbox h3{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;color:var(--forest);position:sticky;top:0;background:var(--card);padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:16px;z-index:1}
.mx{cursor:pointer;color:var(--muted);font-size:22px;font-weight:300;line-height:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--forest);color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:300;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.chart-wrap{position:relative;height:220px}
.part-row{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:9px;padding:9px 11px;margin-bottom:6px}
.part-row input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff}
.obl-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);padding:18px;margin-bottom:12px;cursor:pointer;animation:fadein .3s ease;border-left:4px solid var(--sage)}
.obl-card.md{border-left-color:var(--green)}.obl-card.ld{border-left-color:var(--red)}
@media(max-width:640px){.f2,.fld2g,.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}main{padding:16px 14px 70px}.mbox{padding:20px}.auth-card{padding:28px 22px}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="brand-mark">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg></div>
      <div><div class="brand-name">Finanzas <em>Personales</em></div><div class="brand-sub">Control inteligente de tus finanzas</div></div>
    </div>
    <div class="atabs"><button class="atab on" onclick="swTab('l')">Ingresar</button><button class="atab" onclick="swTab('r')">Registrarse</button></div>
    <div id="amsg" class="amsg"></div>
    <div id="tl">
      <div class="fld"><label>Correo</label><input type="email" id="le" placeholder="tu@correo.com" onkeydown="if(event.key==='Enter')login()"></div>
      <div class="fld"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btnp" onclick="login()" id="blg">Ingresar a mi cuenta</button>
      <div class="afoot"><a href="#" onclick="reset()" style="color:var(--forest3);font-weight:600">¿Olvidaste tu contraseña?</a></div>
    </div>
    <div id="tr" style="display:none">
      <div class="fld2g">
        <div class="fld"><label>Nombre</label><input type="text" id="rn" placeholder="Juan"></div>
        <div class="fld"><label>Apellido</label><input type="text" id="ra" placeholder="Pérez"></div>
      </div>
      <div class="fld"><label>Correo</label><input type="email" id="re" placeholder="tu@correo.com"></div>
      <div class="fld"><label>Contraseña (mín. 8 caracteres)</label><input type="password" id="rp" placeholder="••••••••"></div>
      <button class="btnp" onclick="register()" id="brg">Crear mi cuenta gratuita</button>
    </div>
    <div class="danc">D · A · N · C</div>
  </div>
</div>
<div id="app-screen">
  <header>
    <div class="hbrand">
      <div class="hico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg></div>
      <div class="htit">Finanzas Personales <small>beta</small></div>
    </div>
    <div class="hr"><span class="hun" id="hun"></span><div class="hav" id="hav">?</div><button class="hout" onclick="logout()">Salir</button></div>
  </header>
  <nav>
    <button class="nb on" data-v="resumen" onclick="nav(this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Resumen</button>
    <button class="nb" data-v="presupuesto" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke-linecap="round"/></svg>Presupuesto</button>
    <button class="nb" data-v="obligaciones" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round"/></svg>Obligaciones</button>
    <button class="nb" data-v="ahorros" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M19 7V4a1 1 0 00-1-1H5a2 2 0 000 4h15a1 1 0 011 1v4h-3a2 2 0 000 4h3a1 1 0 001-1v-2a1 1 0 00-1-1" stroke-linecap="round"/><path d="M3 5v14a2 2 0 002 2h15a1 1 0 001-1v-4" stroke-linecap="round"/></svg>Ahorros</button>
    <button class="nb" data-v="extractos" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15" stroke-linecap="round"/></svg>Extractos</button>
    <button class="nb" data-v="nieve" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M2 12h20M12 2l-4 4m4-4l4 4M12 22l-4-4m4 4l4-4" stroke-linecap="round"/></svg>Bola de Nieve</button>
    <button class="nb" data-v="libros" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke-linecap="round"/></svg>Libros</button>
    <button class="nb" data-v="libros" onclick="nav(this)"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke-linecap="round"/></svg>Libros</button>
  </nav>
  <main id="main"></main>
</div>
<div class="mbg" id="mbg"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>
<script>
const SURL="https://dzlxyapzbdhfdundgcpm.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6bHh5YXB6YmRoZmR1bmRnY3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzc1NzUsImV4cCI6MjA5ODA1MzU3NX0.3TugcXH-1amdvfnVcWHDwKftXRCDSPxV64DYL4XLgMU";
const SB=supabase.createClient(SURL,SKEY,{auth:{persistSession:true,storageKey:'fp-session',autoRefreshToken:true,detectSessionInUrl:false}});
let U=null,P=null,V='resumen',mesV=new Date().getMonth()+1,anioV=new Date().getFullYear(),segV='Todos';
const MES=mesV,ANIO=anioV;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const fmt=v=>'$ '+(+v||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const hoy=()=>new Date().toISOString().slice(0,10);
const mesN=m=>['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m-1];
const ff=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'}):'—';
const ld=()=>'<div class="spin"></div>';
const SEGS=['Todos','Créditos Bancarios','Avances / Tarjetas','Préstamos Personales','Gastos Compartidos'];
const SEGCOL={'Créditos Bancarios':'var(--blue)','Avances / Tarjetas':'var(--amber)','Préstamos Personales':'var(--green)','Gastos Compartidos':'var(--sage)'};

function toast(m,d=2400){const t=$('#toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),d)}
function openM(h){$('#mbox').innerHTML=h;$('#mbg').classList.add('on')}
function closeM(){$('#mbg').classList.remove('on')}
$('#mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeM()});

function swTab(t){
  $$('.atab').forEach((b,i)=>b.classList.toggle('on',i===(t==='l'?0:1)));
  $('#tl').style.display=t==='l'?'block':'none';
  $('#tr').style.display=t==='r'?'block':'none';
  $('#amsg').className='amsg';
}
function amsg(m,t='err'){const e=$('#amsg');e.textContent=m;e.className='amsg '+t}
async function login(){
  const e=$('#le').value.trim(),p=$('#lp').value;
  if(!e||!p)return amsg('Ingresa correo y contraseña.');
  const btn=$('#blg');btn.disabled=true;btn.textContent='Verificando...';
  const{error}=await SB.auth.signInWithPassword({email:e,password:p});
  if(error){amsg(error.message);btn.disabled=false;btn.textContent='Ingresar a mi cuenta'}
}
async function register(){
  const n=$('#rn').value.trim(),a=$('#ra').value.trim(),e=$('#re').value.trim(),p=$('#rp').value;
  if(!n||!e||!p)return amsg('Completa todos los campos.');
  if(p.length<8)return amsg('Contraseña: mínimo 8 caracteres.');
  const btn=$('#brg');btn.disabled=true;btn.textContent='Creando cuenta...';
  const{error}=await SB.auth.signUp({email:e,password:p,options:{data:{nombre:n,apellido:a}}});
  if(error){amsg(error.message);btn.disabled=false;btn.textContent='Crear mi cuenta gratuita'}
  else amsg('Cuenta creada. Intenta ingresar.','ok');
}
async function reset(){const e=prompt('Ingresa tu correo:');if(e){await SB.auth.resetPasswordForEmail(e);amsg('Revisa tu correo.','ok')}}
async function logout(){await SB.auth.signOut()}

SB.auth.onAuthStateChange(async(ev,sess)=>{
  const blg=$('#blg');if(blg&&blg.disabled){blg.disabled=false;blg.textContent='Ingresar a mi cuenta'}
  if(sess?.user){
    U=sess.user;
    const{data}=await SB.from('perfiles').select('*').eq('id',U.id).maybeSingle();
    P=data;
    $('#auth-screen').style.display='none';
    $('#app-screen').style.display='block';
    const nm=P?.nombre||U.email.split('@')[0];
    $('#hun').textContent=nm;$('#hav').textContent=nm.charAt(0).toUpperCase();
    rv();
  }else{U=null;P=null;$('#auth-screen').style.display='flex';$('#app-screen').style.display='none'}
});

// ── RESUMEN con gráficas ───────────────────────────────────────────
let chartPie=null, chartBar=null;
async function rR(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const[{data:ing},{data:gas},{data:obls}]=await Promise.all([
    SB.from('ingresos').select('valor').eq('usuario_id',uid).eq('anio',ANIO).eq('mes',MES),
    SB.from('gastos').select('valor,naturaleza,categoria').eq('usuario_id',uid).eq('anio',ANIO).eq('mes',MES),
    SB.from('obligaciones').select('*,cuotas(valor_pagado,estado)').or(`titular_id.eq.${uid},deudor_id.eq.${uid}`).eq('estado','activa')
  ]);
  const tI=(ing||[]).reduce((a,r)=>a+(+r.valor),0);
  const tG=(gas||[]).reduce((a,r)=>a+(+r.valor),0);
  // Obligaciones: titular=uid = me deben (incluye titular===deudor = auto-registro)
  // deudor=uid y titular!=uid = le debo (obligaciones donde otro es titular)
  const meDeben=(obls||[]).filter(o=>o.titular_id===uid).reduce((a,o)=>{
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    return a+Math.max(+o.monto_total-p,0);},0);
  const leDebo=(obls||[]).filter(o=>o.deudor_id===uid&&o.titular_id!==uid).reduce((a,o)=>{
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    return a+Math.max(+o.monto_total-p,0);},0);

  // Agrupar gastos por categoría para gráfica
  const byCat={};
  (gas||[]).forEach(g=>{byCat[g.categoria]=(byCat[g.categoria]||0)+(+g.valor)});
  const catLabels=Object.keys(byCat).slice(0,7);
  const catVals=catLabels.map(k=>byCat[k]);
  const catColors=['#2e7d52','#c9a84c','#2563eb','#d64e4e','#8b5cf6','#5a8a6f','#b87c1a'];

  // Últimos 6 meses para gráfica de barras
  const meses6=[],ingMes=[],gasMes=[];
  for(let i=5;i>=0;i--){
    const d=new Date(ANIO,MES-1-i,1);
    const m=d.getMonth()+1,y=d.getFullYear();
    meses6.push(mesN(m));
    const[{data:ii},{data:gg}]=await Promise.all([
      SB.from('ingresos').select('valor').eq('usuario_id',uid).eq('anio',y).eq('mes',m),
      SB.from('gastos').select('valor').eq('usuario_id',uid).eq('anio',y).eq('mes',m)
    ]);
    ingMes.push((ii||[]).reduce((a,r)=>a+(+r.valor),0));
    gasMes.push((gg||[]).reduce((a,r)=>a+(+r.valor),0));
  }

  $('#main').innerHTML=`
  <div style="font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:14px">${mesN(MES)} ${ANIO}</div>
  <div class="g3">
    <div class="sc"><div class="sl">Ingresos</div><div class="sv pos">${fmt(tI)}</div><div class="sh2">este mes</div></div>
    <div class="sc"><div class="sl">Gastos</div><div class="sv ${tG>tI?'neg':'warn'}">${fmt(tG)}</div><div class="sh2">${tI>0?((tG/tI*100).toFixed(0))+'% de ingresos':''}</div></div>
    <div class="sc"><div class="sl">Balance</div><div class="sv ${tI-tG>=0?'pos':'neg'}">${fmt(tI-tG)}</div></div>
    <div class="sc"><div class="sl">Me deben</div><div class="sv pos">${fmt(meDeben)}</div></div>
    <div class="sc"><div class="sl">Posición neta</div><div class="sv ${meDeben-leDebo>=0?'pos':'neg'}">${fmt(meDeben-leDebo)}</div></div>
  </div>
  <div class="g2" style="margin-bottom:20px">
    <div class="card">
      <div class="ctit">Gastos por categoría</div>
      ${catLabels.length?`<div class="chart-wrap"><canvas id="chartPie"></canvas></div>`:'<div class="empty"><p>Sin gastos registrados este mes.</p></div>'}
    </div>
    <div class="card">
      <div class="ctit">Ingresos vs Gastos (6 meses)</div>
      <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
    </div>
  </div>
  ${(obls||[]).length?`<div class="card"><div class="ctit">Obligaciones activas <button class="btn bfo sm" onclick="nav(document.querySelector('[data-v=obligaciones]'));rO()">Ver todas</button></div>
  <div class="tw"><table><tr><th>Concepto</th><th>Segmento</th><th>Persona</th><th>Rol</th><th>Saldo</th></tr>
  ${(obls||[]).slice(0,8).map(o=>{
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    const s=Math.max(+o.monto_total-p,0);
    const esMio=o.titular_id===uid;
    const persona=o.deudor_nombre||(esMio?'—':'tú');
    return `<tr class="hv"><td><b>${o.nombre}</b></td>
      <td><span class="badge bm" style="font-size:10px">${o.segmento||'—'}</span></td>
      <td style="font-size:13px">${persona}</td>
      <td><span class="badge ${esMio?'bg':'br'}">${esMio?'Me deben':'Le debo'}</span></td>
      <td class="num ${esMio?'pos':'neg'}">${fmt(s)}</td></tr>`;
  }).join('')}</table></div></div>`:''}`;

  // Renderizar gráficas — usar setTimeout para asegurar que el DOM esté listo
  setTimeout(()=>{
    if(catLabels.length){
      const ctx=$('#chartPie')?.getContext('2d');
      if(ctx){
        if(chartPie){try{chartPie.destroy()}catch(e){}}
        chartPie=new Chart(ctx,{type:'doughnut',data:{labels:catLabels,datasets:[{data:catVals,backgroundColor:catColors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}},cutout:'65%',animation:{duration:600}}});
      }
    }
    const ctx2=$('#chartBar')?.getContext('2d');
    if(ctx2){
      if(chartBar){try{chartBar.destroy()}catch(e){}}
      chartBar=new Chart(ctx2,{type:'bar',data:{labels:meses6,datasets:[
        {label:'Ingresos',data:ingMes,backgroundColor:'rgba(46,125,82,.7)',borderRadius:6},
        {label:'Gastos',data:gasMes,backgroundColor:'rgba(214,78,78,.7)',borderRadius:6}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(0,0,0,.05)'}},x:{grid:{display:false}}},animation:{duration:600}}});
    }
  },100);
}

  const[{data:ing},{data:gas},{data:pre}]=await Promise.all([
    SB.from('ingresos').select('*').eq('usuario_id',uid).eq('anio',anioV).eq('mes',mesV).order('created_at'),

        <span style="font-size:12px;color:var(--muted)">de ${fmt(b)}</span>
      </div>
      <div class="pw"><div class="pb" style="width:${Math.min(b>0?g/b*100:0,100)}%;background:${c}"></div></div>
      <div style="font-size:11.5px;color:var(--muted)">${b>0?((g/b*100).toFixed(0))+'% utilizado':'Sin presupuesto'}</div>
    </div>`).join('')}
  </div>
  <div class="g2">
    <div class="card"><div class="ctit">Ingresos <button class="btn bgo sm" onclick="mIng()">＋</button></div>
      ${!ing?.length?'<div class="empty"><p>Sin ingresos. Haz clic en <b>＋</b>.</p></div>':''}
      <div class="tw"><table>${(ing||[]).map(r=>`<tr class="hv"><td>${r.concepto}</td>
        <td class="num pos"><b>${fmt(r.valor)}</b></td>
        <td><button class="btn bda xs" onclick="SB.from('ingresos').delete().eq('id','${r.id}').then(rP)">✕</button></td>
      </tr>`).join('')}</table></div>

    <div class="card"><div class="ctit">Gastos <button class="btn bgo sm" onclick="mGas()">＋</button></div>

// ── OBLIGACIONES con segmentos ─────────────────────────────────────
let partsG=[];
async function rO(){
  $('#main').innerHTML=ld();
  const uid=U.id;
  const{data:obls}=await SB.from('obligaciones')
    .select('*,cuotas(*)')
    .or(`titular_id.eq.${uid},deudor_id.eq.${uid}`)
    .order('created_at',{ascending:false});

  const pids=[...new Set((obls||[]).flatMap(o=>[o.titular_id,o.deudor_id]).filter(Boolean))];
  let pm={};
  if(pids.length){
    const{data:ps}=await SB.from('perfiles').select('id,nombre,apellido').in('id',pids);
    pm=Object.fromEntries((ps||[]).map(p=>[p.id,(p.nombre||'')+(p.apellido?' '+p.apellido:'')]));
  }

  const act=(obls||[]).filter(o=>o.estado==='activa');
  const cerr=(obls||[]).filter(o=>o.estado!=='activa');

  // Filtrar por segmento activo
  const filtrados=segV==='Todos'?act:act.filter(o=>(o.segmento||'Préstamos Personales')===segV);
  // titular===uid = me deben (incluyendo auto-registros donde titular===deudor===uid)
  const meDeben=filtrados.filter(o=>o.titular_id===uid);
  const leDebo=filtrados.filter(o=>o.deudor_id===uid&&o.titular_id!==uid);

  function getPersona(o,esMio){
    if(esMio) return o.deudor_nombre || pm[o.deudor_id] || '—';
    return pm[o.titular_id] || '—';
  }

  function oblCard(o,esMio){
    const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);
    const sal=Math.max(+o.monto_total-p,0);const pct=+o.monto_total>0?(p/+o.monto_total*100):0;
    const persona=getPersona(o,esMio);
    const col=esMio?'var(--green)':'var(--red)';
    const segCol=SEGCOL[o.segmento||'']||'var(--sage)';
    return `<div class='obl-card ${esMio?"md":"ld"}' onclick='vObl("${o.id}",${esMio})'>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-weight:700;font-size:15px">${o.nombre}</span>
            ${o.es_grupal?'<span class="badge bb" style="font-size:9px">GRUPAL</span>':''}
          </div>
          <div style="font-size:12px;color:var(--muted)">${esMio?'← '+persona+' te debe':'→ Le debes a '+persona}</div>
          <div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">
            <span class="badge bm" style="font-size:10px;border-left:3px solid ${segCol}">${o.segmento||'—'}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:22px;font-weight:800;color:${col}">${fmt(sal)}</div>
          <div style="font-size:11px;color:var(--muted)">pendiente</div>
        </div>
      </div>
      <div class="pw"><div class="pb" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)">
        <span>Pagado ${fmt(p)} de ${fmt(+o.monto_total)}</span><span>${pct.toFixed(0)}%</span>
      </div>
    </div>`;
  }

  const tMD=meDeben.reduce((a,o)=>{const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);return a+Math.max(+o.monto_total-p,0)},0);
  const tLD=leDebo.reduce((a,o)=>{const p=(o.cuotas||[]).filter(c=>c.estado==='pagado').reduce((s,c)=>s+(+c.valor_pagado),0);return a+Math.max(+o.monto_total-p,0)},0);

  $('#main').innerHTML=`
  <div class="g3" style="margin-bottom:16px">
    <div class="sc"><div class="sl">Me deben</div><div class="sv pos">${fmt(tMD)}</div></div>
    <div class="sc"><div class="sl">Le debo</div><div class="sv neg">${fmt(tLD)}</div></div>
    <div class="sc"><div class="sl">Posición neta</div><div class="sv ${tMD-tLD>=0?'pos':'neg'}">${fmt(tMD-tLD)}</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px">
    <div class="segtabs">
      ${SEGS.map(s=>`<button class="segtab ${segV===s?'on':''}" onclick="segV='${s}';rO()">${s}</button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgo" onclick="mNObl()">＋ Nueva</button>
      <button class="btn bgh sm" onclick="mNOblG()">＋ Grupal</button>
    </div>
  </div>
  <div class="g2">
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px">← Me deben (${meDeben.length})</div>
      ${!meDeben.length?'<div class="empty"><p>Sin obligaciones en esta categoría.</p></div>':meDeben.map(o=>oblCard(o,true)).join('')}
    </div>
    <div>
      <div style="font-size:11px;font-weight:700;color:var(--red);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px">→ Le debo (${leDebo.length})</div>
      ${!leDebo.length?'<div class="empty"><p>Sin deudas en esta categoría.</p></div>':leDebo.map(o=>oblCard(o,false)).join('')}
    </div>
  </div>
  ${cerr.length?`<details style="margin-top:20px"><summary style="cursor:pointer;font-size:13px;color:var(--muted);font-weight:600">Ver ${cerr.length} cerrada(s)</summary>
  <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px">${cerr.map(o=>oblCard(o,o.titular_id===uid)).join('')}</div></details>`:''}`;
}

function mNObl(){openM(`<h3>Nueva obligación <span class="mx" onclick="closeM()">×</span></h3>
  <div class="ff"><label>Tipo</label>
    <div style="display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden" id="dir-seg">
      <button id="sd" style="flex:1;border:none;padding:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--green-bg);color:var(--green)" onclick="oblD='me_deben';$('#sd').style.background='var(--green-bg)';$('#sd').style.color='var(--green)';$('#ld2').style.background='var(--cream)';$('#ld2').style.color='var(--muted)'">💚 Me deben</button>

    </div>
  </div>

async function savObl(){
  const nom=$('#on').value.trim(),m=+$('#om').value,f=$('#of').value;
  const nombreP=$('#onp').value.trim(),email=$('#oe').value.trim().toLowerCase();
  const seg=$('#oseg').value;
  if(!nom||!m)return toast('⚠ Nombre y monto requeridos');
  const uid=U.id;
  const{data:obl,error}=await SB.from('obligaciones').insert({
    titular_id:uid,deudor_id:uid,nombre:nom,descripcion:seg,
    monto_total:m,fecha_inicio:f,num_cuotas:+$('#oq').value||null,
    valor_cuota:+$('#ovc').value||null,
    notas:$('#ono').value||'',
    segmento:seg,deudor_nombre:nombreP,deudor_email:email,estado:'activa'
  }).select().single();
  if(error)return toast('Error: '+error.message);
  const nc=+$('#oq').value;
  if(nc>0){
    const vc=+$('#ovc').value||m/nc;const[y,mo]=f.split('-').map(Number);const rows=[];
    for(let i=1;i<=nc;i++){const mm=(mo-1+(i-1))%12+1,yy=y+Math.floor((mo-1+(i-1))/12);
      rows.push({obligacion_id:obl.id,numero:i,concepto:`Cuota ${i}`,fecha_prog:`${yy}-${String(mm).padStart(2,'0')}-01`,valor_esperado:vc})}
    await SB.from('cuotas').insert(rows);
  }else await SB.from('cuotas').insert({obligacion_id:obl.id,numero:1,concepto:'Saldo',valor_esperado:m});
  if(email)await SB.from('invitaciones').insert({remitente_id:uid,destinatario_email:email,obligacion_id:obl.id});
  toast('Obligación creada ✓');closeM();rO();
}

  if(typeof pdfjsLib==='undefined'){toast('⚠ Error cargando pdf.js. Recarga la página.',4000);return}
  // Usar workerSrc desde CDN compatible con GitHub Pages
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const ab=await file.arrayBuffer();
  let allLines=[];
  try{
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      // Agrupar items por posición Y para reconstruir líneas
      const byY={};
      tc.items.forEach(item=>{
        const y=Math.round(item.transform[5]);
        if(!byY[y])byY[y]=[];
        byY[y].push({x:item.transform[4],t:item.str});
      });
      Object.keys(byY).sort((a,b)=>b-a).forEach(y=>{
        const linea=byY[y].sort((a,b)=>a.x-b.x).map(i=>i.t).join(' ').trim();
        if(linea)allLines.push(linea);
      });
    }
  }catch(e){console.error('PDF error:',e);toast('⚠ Error leyendo PDF: '+e.message,4000);return}
  const texto=allLines.join('\n');
  const banco=detBanco(texto);
  console.log('Banco:',banco,'Líneas:',allLines.length);
  if(banco==='PacifiCard')parsPC(allLines);
  else if(banco==='Diners'||banco==='Discover')parsDC(allLines,banco);
  else if(banco==='Pichincha')parsPI(allLines);
  else{toast('Banco no reconocido. Usa la plantilla Excel.',4000);parsGen(allLines,banco)}
}
function detBanco(t){
  if(t.includes('PACIFICARD')||t.includes('PacifiCard')||t.includes('intermatico')||t.includes('pacifico.fin.ec'))return 'PacifiCard';
  if(t.includes('DINERS CLUB')||t.includes('dinersclub')||t.includes('Diners Club'))return 'Diners';
  if(t.includes('DISCOVER')||t.includes('discover.ec'))return 'Discover';
  if(t.includes('BANCO PICHINCHA')||t.includes('pichincha.com')||t.includes('VISA PLATINUM')||t.includes('Banco Pichincha'))return 'Pichincha';
  return 'Desconocido';
}
const MESES2={ENE:1,FEB:2,MAR:3,ABR:4,MAY:5,JUN:6,JUL:7,AGO:8,SEP:9,OCT:10,NOV:11,DIC:12};

// PacifiCard: ENE/29 151978 DESCRIPCION ... TIPO VALOR
// Patron probado con pdftotext real
function parsPC(lineas){
  let sec=false;
  const re=/^([A-Z]{3})\/(\d{1,2})\s+\d+\s+(.+?)\s{2,}(?:\S+\s+)?(CONS|DIF|PAGO|N\/D|AV)\s+([\d,\.]+)/;
  for(const l of lineas){
    if(l.includes('DETALLE DE MOVIMIENTOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('TOTAL PAGO DE CONTADO')||l.includes('CONCEPTOS BÁSICOS')||l.includes('Pague por lo menos'))break;
    const m=re.exec(l);
    if(m){
      const[,mes,dia,desc,tipo,val]=m;
      const mn=MESES2[mes]||MES;
      const v=parseFloat(val.replace(/,(?=\d{3})/g,'').replace(',','.'));
      if(v>0)extB.push({banco:'PacifiCard',
        fecha_tx:`${ANIO}-${String(mn).padStart(2,'0')}-${String(dia).padStart(2,'0')}`,
        concepto:desc.trim().replace(/\s+/g,' '),tipo_op:tipo,valor:v,categoria:acat(desc)});
    }
  }
}

// Diners/Discover: DD/MM VALE ESTABLECIMIENTO (CUOTA) VALOR
function parsDC(lineas,banco){
  let sec=false;
  const re=/(\d{2})\/(\d{2})\s+\d+\s+(.+?)\s{2,}(?:\((\d+)\/(\d+)\)\s+)?([\d,\.]+)(?:\s*-|\s*$)/;
  for(const l of lineas){
    if(l.includes('Consumo período actual')||l.includes('Detalle débitos y créditos')||l.includes('DETALLE DE PAGOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('Información de tarifas')||l.includes('Comprobante de venta')||l.includes('Resumen IVA'))break;
    const m=re.exec(l);
    if(m){
      const[,dd,mm,desc,c1,,val]=m;
      const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0&&v<50000){
        const dU=desc.toUpperCase();
        let tipo=c1?'DIF':'CONS';
        if(dU.includes('PAGO')||dU.includes('MUCHAS GRACIAS'))tipo='PAGO';
        else if(dU.includes('IVA')||dU.includes('SOLCA'))tipo='ND';
        extB.push({banco,fecha_tx:`${ANIO}-${mm}-${dd}`,
          concepto:desc.trim().replace(/\s+/g,' '),tipo_op:tipo,valor:v,categoria:acat(desc)});
      }
    }
  }
}

// Pichincha: DD/MM REF DESCRIPCION OPERACION VALOR
// Patron probado con pdftotext real
function parsPI(lineas){
  let sec=false;
  const re=/^(\d{2})\/(\d{2})\s+\d+\s+(.+?)\s{2,}(DIFERIDO|CONSUMO|N\/D).*?([\d]{1,3}(?:[.,]\d{3})*[.,]\d{2})-?\s*$/;
  const rePago=/^(\d{2})\/(\d{2})\s+\d+\s+(SU PAGO[^0-9]*)\s+([\d]{1,3}(?:[.,]\d{3})*[.,]\d{2})-?\s*$/;
  for(const l of lineas){
    if(l.includes('DETALLE DE MOVIMIENTOS')){sec=true;continue}
    if(!sec)continue;
    if(l.includes('TOTAL CONSUMOS MES')||l.includes('GLOSARIO')||l.includes('DESCRIPCIÓN DE TÉRMINOS'))break;
    const mp=rePago.exec(l);
    if(mp){const[,dd,mm,desc,val]=mp;const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0)extB.push({banco:'Pichincha',fecha_tx:`${ANIO}-${mm}-${dd}`,concepto:'SU PAGO',tipo_op:'PAGO',valor:v,categoria:'Pago'});
      continue;}
    const m=re.exec(l);
    if(m){const[,dd,mm,desc,tipo,val]=m;
      const v=parseFloat(val.replace(/\./g,'').replace(',','.'));
      if(v>0){
        const tOp=tipo==='DIFERIDO'?'DIF':tipo==='CONSUMO'?'CONS':'ND';
        extB.push({banco:'Pichincha',fecha_tx:`${ANIO}-${mm}-${dd}`,
          concepto:desc.trim().replace(/\s+/g,' ').replace(/\s+Q\s*$/,''),
          tipo_op:tOp,valor:v,categoria:acat(desc)});
      }
    }
  }
}
function parsGen(lineas,banco){
  const re=/(\d{1,3}(?:[,\.]\d{3})*[,\.]\d{2})/g;
  for(const l of lineas){if(l.match(/^\d{2}[\/\-]\d{2}/)){const mm=l.match(re);
    if(mm){const v=parseFloat(mm[mm.length-1].replace(/,(?=\d{3})/g,'').replace(',','.'));
      if(v>0.5&&v<100000)extB.push({banco,fecha_tx:null,concepto:l.slice(0,60).trim(),tipo_op:'',valor:v,categoria:'Sin categoría'})}}}
}

        <span style="font-weight:800;color:${s.color||'var(--green)'};">${pct>=100?'✅':pct.toFixed(0)+'%'}</span>
      </div>
      <div class="pw"><div class="pb" style="width:${Math.min(pct,100)}%;background:${s.color||'var(--forest3)'}"></div></div>
      <div style="font-size:12px;margin-top:6px;display:flex;justify-content:space-between">
        <span class="pos">${fmt(+s.acumulado)}</span><span style="color:var(--muted)">${fmt(+s.objetivo)}</span>
      </div>
    </div>`}).join('')}
  </div></div>`:''}`;
}

function mApLib(id,signo){
  const tipo=signo>0?'Ingreso':'Egreso';
  openM(`<h3>Registrar ${tipo} <span class="mx" onclick="closeM()">×</span></h3>
  <div class="ff"><label>Valor ($)</label><input id="apv" type="number" step="0.01" min="0"></div>
  <div class="ff"><label>Fecha</label><input id="apf" type="date" value="${hoy()}"></div>
  <div class="ff"><label>Nota / concepto</label><input id="apn" placeholder="Descripción del movimiento…"></div>
  <button class="btn bfo" style="width:100%" onclick="savApLib('${id}',${signo})">Registrar</button>`);
}

async function savApLib(id,signo){
  const v=+$('#apv').value;if(!v)return toast('⚠ Ingresa el valor');
  const{data:ah}=await SB.from('ahorros').select('acumulado').eq('id',id).single();
  const delta=v*signo;
  await Promise.all([
    SB.from('aportes_ahorro').insert({ahorro_id:id,valor:delta,fecha:$('#apf').value,nota:$('#apn').value}),
    SB.from('ahorros').update({acumulado:(+ah.acumulado)+delta}).eq('id',id)
  ]);
  toast('Movimiento registrado ✓');closeM();rL();
}
</script>
